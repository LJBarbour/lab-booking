<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lab Booking Debug</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  display:grid;
  grid-template-columns:260px 1fr;
  height:100vh;
}

aside {
  padding:20px;
  border-right:1px solid #ddd;
  background:#fafafa;
}

main {
  padding:20px;
}

.calendar {
  display:grid;
  grid-template-columns:60px repeat(7,1fr);
  border:2px solid #333;
  background:white;
}

.cell {
  border:1px solid #999;
  height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
}

.header {
  background:#e9ecff;
  height:50px;
  font-weight:bold;
  flex-direction:column;
}

.time {
  font-size:11px;
  color:#444;
  justify-content:flex-end;
  padding-right:6px;
  background:#f7f7f7;
}

.booking {
  background:#cfe3ff;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
}

pre {
  font-size:11px;
  background:#f0f0f0;
  padding:10px;
}
</style>
</head>

<body>

<aside>
<h3>Debug</h3>
<pre id="log"></pre>
</aside>

<main>
<h2>Calendar</h2>
<div id="calendar" class="calendar"></div>
</main>

<script>

function log(msg){
  console.log(msg);
  document.getElementById("log").textContent += msg + "\n";
}

log("VERSION 1.3.13");

const REST = "https://mqpvnisphntdwhqoiqlt.supabase.co/rest/v1";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xcHZuaXNwaG50ZHdocW9pcWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzM5NjIsImV4cCI6MjA5MzE0OTk2Mn0.7eAeXAh0heqiaTLclqUzAeNY2gQDcbxNRe2LrLXvpHg";

const HEADERS = {
  "apikey": KEY,
  "Authorization": `Bearer ${KEY}`,
  "Content-Type": "application/json"
};

let instruments = [];
let bookings = [];

function weekDates(){
  const today = new Date();
  const monday = new Date(today);
  const diff = (today.getDay()===0?-6:1-today.getDay());
  monday.setDate(today.getDate()+diff);

  return Array.from({length:7},(_,i)=>{
    const d=new Date(monday);
    d.setDate(monday.getDate()+i);
    return d;
  });
}

async function load(){

  log("Loading instruments...");
  instruments = await fetch(`${REST}/instruments?select=*`, {headers:HEADERS}).then(r=>r.json());
  log("Instruments: " + instruments.length);

  log("Loading bookings...");
  bookings = await fetch(`${REST}/bookings?select=*`, {headers:HEADERS}).then(r=>r.json());
  log("Bookings: " + bookings.length);

  renderCalendar();
}

function renderCalendar(){

  log("Rendering calendar...");

  const cal = document.getElementById("calendar");
  cal.innerHTML="";

  const currentInstr = instruments[0];

  const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const dates=weekDates();

  cal.appendChild(document.createElement("div"));

  days.forEach((d,i)=>{
    const h=document.createElement("div");
    h.className="cell header";
    h.innerHTML = d + "<div>" + dates[i].toISOString().split("T")[0] + "</div>";
    cal.appendChild(h);
  });

  for(let h=0;h<24;h++){
    const t=document.createElement("div");
    t.className="cell time";
    t.textContent=h+":00";
    cal.appendChild(t);

    for(let i=0;i<7;i++){
      const dateStr = dates[i].toISOString().split("T")[0];
      const c=document.createElement("div");
      c.className="cell";

      const b = bookings.find(x =>
        x.instrument===currentInstr.id &&
        x.hour===h &&
        x.date===dateStr
      );

      if(b){
        c.innerHTML = `<div class="booking">${b.name}</div>`;
      }

      cal.appendChild(c);
    }
  }

  log("Calendar rendered");
}

// RUN
load();

</script>
</body>
</html>
