<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Supabase Auth Test</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: system-ui; padding:40px; }
button { padding:10px 20px; margin-right:10px; }
#status { margin-top:20px; font-family: monospace; white-space: pre-wrap; }
</style>
</head>

<body>

<h2>Auth Test (v1.2.8)</h2>

<button id="init">Init</button>
<button id="login">Login</button>
<button id="logout">Logout</button>

<div id="status"></div>

<script>

console.log("VERSION: 1.2.8");

// ✅ Correct Supabase base URL (fixed)
const URL = "https://mqpvnisphntdwhqoiqlt.supabase.co";

// ✅ Your actual anon key (from your original working app)
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xcHZuaXNwaG50ZHdocW9pcWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzM5NjIsImV4cCI6MjA5MzE0OTk2Mn0.7eAeXAh0heqiaTLclqUzAeNY2gQDcbxNRe2LrLXvpHg";

let sb = null;

function log(msg){
  console.log(msg);
  document.getElementById("status").textContent += msg + "\n";
}

// INIT
document.getElementById("init").onclick = () => {
  log("---- INIT ----");
  log("URL = " + JSON.stringify(URL));
  log("Length = " + URL.length);

  try {
    sb = window.supabase.createClient(URL, KEY);
    log("✅ Init success");
  } catch (err) {
    log("❌ Init failed:");
    log(err.message);
  }
};

// LOGIN
document.getElementById("login").onclick = async () => {
  if(!sb){
    log("❌ Not initialized");
    return;
  }

  const email = prompt("Email:");
  const password = prompt("Password:");

  const { data, error } = await sb.auth.signInWithPassword({
    email, password
  });

  if(error){
    log("❌ Login failed: " + error.message);
    return;
  }

  log("✅ Logged in: " + data.user.email);
};

// LOGOUT
document.getElementById("logout").onclick = async () => {
  if(!sb) return;

  await sb.auth.signOut();
  log("Logged out");
};

</script>

</body>
</html>
