<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Booking</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:grid;
  grid-template-columns: 250px 1fr;
  height:100vh;
}

aside {
  background:#f4f4f4;
  padding:15px;
  border-right:1px solid #ccc;
}

main {
  padding:20px;
}

h3 { margin-top:0; }

button {
  display:block;
  width:100%;
  margin:4px 0;
  padding:6px;
  cursor:pointer;
}

select {
  width:100%;
  padding:6px;
  margin-bottom:10px;
}

.calendar {
  display:grid;
  grid-template-columns: 60px repeat(5, 1fr);
  border:1px solid #ccc;
}

.cell {
  border:1px solid #ddd;
  height:40px;
  font-size:12px;
  padding:4px;
}

.time {
  background:#f0f0f0;
  text-align:right;
}

.header {
  background:#e0e0e0;
  font-weight:bold;
  text-align:center;
}

.loading {
  padding:20px;
}
</style>
</head>

<body>

<aside>
  <h3>User</h3>
  <select id="user"></select>

  <h3>Instruments</h3>
  <div id="instr"></div>
</aside>

<main>
  <h2 id="title"></h2>
  <div id="desc"></div>

  <div id="calendar" class="calendar"></div>
</main>

<script>
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xcHZuaXNwaG50ZHdocW9pcWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzM5NjIsImV4cCI6MjA5MzE0OTk2Mn0.7eAeXAh0heqiaTLclqUzAeNY2gQDcbxNRe2LrLXvpHg";

let users = [];
let instruments = [];
let bookings = [];

let currentInstr = null;

async function load(){
  try {
    const u = await fetch(`https://mqpvnisphntdwhqoiqlt.supabase.co/rest/v1/users?select=*&apikey=${KEY}`);
    const i = await fetch(`https://mqpvnisphntdwhqoiqlt.supabase.co/rest/v1/instruments?select=*&apikey=${KEY}`);
    const b = await fetch(`https://mqpvnisphntdwhqoiqlt.supabase.co/rest/v1/bookings?select=*&apikey=${KEY}`);

    users = await u.json();
    instruments = await i.json();
    bookings = await b.json();

    render();
  } catch(e){
    document.body.innerHTML = "Error loading data";
    console.error(e);
  }
}

function render(){
  renderUsers();
  renderInstr();
  renderMain();
  renderCalendar();
}

function renderUsers(){
  const el = document.getElementById("user");
  el.innerHTML = users.map(u => `<option>${u.name}</option>`).join("");
}

function renderInstr(){
  const el = document.getElementById("instr");

  el.innerHTML = instruments.map(i =>
    `<button onclick="selectInstr('${i.id}')">${i.name}</button>`
  ).join("");

  if (!currentInstr && instruments.length){
    currentInstr = instruments[0];
  }
}

function selectInstr(id){
  currentInstr = instruments.find(i => i.id === id);
  renderMain();
  renderCalendar();
}

function renderMain(){
  if (!currentInstr) return;
  document.getElementById("title").textContent = currentInstr.name;
  document.getElementById("desc").textContent = currentInstr.description;
}

function renderCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const days = ["Mon","Tue","Wed","Thu","Fri"];

  // header row
  cal.appendChild(document.createElement("div"));
  days.forEach(d=>{
    const h = document.createElement("div");
    h.className = "cell header";
    h.textContent = d;
    cal.appendChild(h);
  });

  for(let hour=8; hour<20; hour++){
    const t = document.createElement("div");
    t.className = "cell time";
    t.textContent = hour + ":00";
    cal.appendChild(t);

    for(let d=0; d<5; d++){
      const c = document.createElement("div");
      c.className = "cell";

      const booking = bookings.find(b =>
        b.instrument === currentInstr.id &&
        b.hour === hour
      );

      if (booking){
        c.textContent = booking.name;
        c.style.background = "#d0eaff";
      }

      cal.appendChild(c);
    }
  }
}

load();
</script>

</body>
</html>
