<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lab Booking</title>

<style>
body { margin:0; font-family:Arial; display:grid; grid-template-columns:260px 1fr; height:100vh; }
aside { background:#fff; border-right:1px solid #ddd; padding:20px; }
main { padding:20px; }

h3 { font-size:12px; text-transform:uppercase; color:#777; }

select { width:100%; padding:8px; margin-bottom:20px; }

button {
  width:100%;
  padding:8px;
  margin-bottom:5px;
  border:none;
  background:#f5f4f0;
  cursor:pointer;
}

button.active { background:#e8f0ea; font-weight:bold; }

.calendar {
  display:grid;
  grid-template-columns:60px repeat(5,1fr);
  border:1px solid #ddd;
}

.cell { border:1px solid #eee; height:40px; font-size:12px; padding:4px; }
.cell.clickable:hover { background:#e8f0ea; cursor:pointer; }

.header { background:#fafafa; font-weight:bold; text-align:center; }
.time { text-align:right; background:#fafafa; }
.booking { background:#c8dff5; }
</style>
</head>

<body>

<aside>
  <h3>Researcher</h3>
  <select id="user"></select>

  <h3>Instruments</h3>
  <div id="instr"></div>
</aside>

<main>
  <h2 id="title"></h2>
  <div id="desc"></div>
  <div id="calendar" class="calendar"></div>
</main>

<script>
const SUPABASE_URL = 'https://mqpvnisphntdwhqoiqlt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...';

const HEADERS = {
  "apikey": SUPABASE_KEY,
  "Authorization": `Bearer ${SUPABASE_KEY}`,
  "Content-Type": "application/json"
};

const API = `${SUPABASE_URL}/rest/v1/bookings`;

let users = [];
let instruments = [];
let bookings = [];

let currentUser = null;
let currentInstr = null;

function getWeekDates(){
  const today = new Date();
  const monday = new Date(today);
  const day = today.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  monday.setDate(today.getDate() + diff);

  const dates = [];
  for(let i=0;i<5;i++){
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates.push(d.toISOString().split("T")[0]);
  }
  return dates;
}

async function load(){
  try {
    users = await fetch(`${SUPABASE_URL}/rest/v1/users`, { headers: HEADERS }).then(r=>r.json());
    instruments = await fetch(`${SUPABASE_URL}/rest/v1/instruments`, { headers: HEADERS }).then(r=>r.json());
    bookings = await fetch(API, { headers: HEADERS }).then(r=>r.json());

    if(!users.length){
      document.body.innerHTML = "No users found in Supabase";
      return;
    }

    if(!instruments.length){
      document.body.innerHTML = "No instruments found in Supabase";
      return;
    }

    currentUser = users[0].name;
    currentInstr = instruments[0];

    render();

  } catch(e){
    document.body.innerHTML = "Error loading data";
    console.error(e);
  }
}

function render(){
  renderUsers();
  renderInstr();
  renderMain();
  renderCalendar();
}

function renderUsers(){
  const el = document.getElementById("user");
  el.innerHTML = users.map(u =>
    `<option ${u.name===currentUser?"selected":""}>${u.name}</option>`
  ).join("");

  el.onchange = e => currentUser = e.target.value;
}

function renderInstr(){
  const el = document.getElementById("instr");

  el.innerHTML = instruments.map(i =>
    `<button class="${currentInstr?.id===i.id?'active':''}"
      onclick="selectInstr('${i.id}')">${i.name}</button>`
  ).join("");
}

function selectInstr(id){
  currentInstr = instruments.find(i => i.id === id);
  render();
}

function renderMain(){
  document.getElementById("title").textContent = currentInstr.name;
  document.getElementById("desc").textContent = currentInstr.description;
}

function renderCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const days = ["Mon","Tue","Wed","Thu","Fri"];
  const dates = getWeekDates();

  cal.appendChild(document.createElement("div"));

  days.forEach(d=>{
    const h = document.createElement("div");
    h.className = "cell header";
    h.textContent = d;
    cal.appendChild(h);
  });

  for(let hour=8; hour<20; hour++){
    const t = document.createElement("div");
    t.className = "cell time";
    t.textContent = hour + ":00";
    cal.appendChild(t);

    for(let i=0;i<5;i++){
      const date = dates[i];

      const c = document.createElement("div");
      c.className = "cell";

      const existing = bookings.find(b =>
        b.instrument === currentInstr.id &&
        b.hour === hour &&
        b.date === date
      );

      if(existing){
        c.textContent = existing.name;
        c.classList.add("booking");
      } else {
        c.classList.add("clickable");
        c.onclick = () => createBooking(hour, date);
      }

      cal.appendChild(c);
    }
  }
}

async function createBooking(hour, date){
  if(!currentUser) return alert("Select a user first");

  const newBooking = {
    id: Date.now().toString(),
    instrument: currentInstr.id,
    date: date,
    hour: hour,
    name: currentUser,
    note: ""
  };

  const res = await fetch(API, {
    method:"POST",
    headers: HEADERS,
    body: JSON.stringify(newBooking)
  });

  if(!res.ok){
    const err = await res.text();
    console.log(err);
    alert("Booking failed");
    return;
  }

  bookings.push(newBooking);
  renderCalendar();
}

load();
</script>

</body>
</html>
