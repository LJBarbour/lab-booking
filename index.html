<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lab Booking</title>

<style>
body {
  margin:0;
  font-family: system-ui, -apple-system, sans-serif;
  display:grid;
  grid-template-columns:260px 1fr;
  height:100vh;
  background:#f6f7fb;
  color:#1a1a1a;
}

aside {
  background:#ffffff;
  border-right:1px solid #e6e8ef;
  padding:24px;
}

h3 {
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:#8a8f9c;
  margin-bottom:10px;
}

select {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #dcdfe6;
  margin-bottom:20px;
  background:#fafbff;
}

button {
  width:100%;
  padding:10px;
  margin-bottom:6px;
  border:none;
  background:none;
  text-align:left;
  border-radius:8px;
  cursor:pointer;
  transition: all 0.15s ease;
}

button:hover {
  background:#f0f3ff;
}

button.active {
  background:#e4ebff;
  color:#2a4bd7;
  font-weight:500;
}

main {
  padding:24px;
}

#title {
  font-size:20px;
  font-weight:600;
}

#desc {
  color:#6e7380;
  font-size:13px;
  margin-bottom:16px;
}

.calendar {
  display:grid;
  grid-template-columns:60px repeat(5,1fr);
  border:1px solid #e6e8ef;
  border-radius:12px;
  overflow:hidden;
  background:#ffffff;
}

.cell {
  border:1px solid #f0f1f5;
  height:46px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  position:relative;
}

.header {
  background:#fafbff;
  font-weight:600;
}

.time {
  font-size:11px;
  color:#9aa0ad;
  justify-content:flex-end;
  padding-right:8px;
  background:#fafbff;
}

.cell.clickable:hover {
  background:#eef2ff;
  cursor:pointer;
}

.booking {
  background:#dbe7ff;
  color:#1d3fd3;
  font-weight:500;
  border-radius:6px;
  padding:4px 8px;
}

.booking.mine {
  background:#d7f5e3;
  color:#1a7a4f;
}

.booking.mine:hover {
  cursor:pointer;
  filter:brightness(0.98);
}
</style>
</head>

<body>

<aside>
  <h3>Researcher</h3>
  <select id="user"></select>

  <h3>Instruments</h3>
  <div id="instr"></div>
</aside>

<main>
  <h2 id="title"></h2>
  <div id="desc"></div>
  <div id="calendar" class="calendar"></div>
</main>

<script>
const URL = "https://mqpvnisphntdwhqoiqlt.supabase.co/rest/v1";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xcHZuaXNwaG50ZHdocW9pcWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzM5NjIsImV4cCI6MjA5MzE0OTk2Mn0.7eAeXAh0heqiaTLclqUzAeNY2gQDcbxNRe2LrLXvpHg";

const HEADERS = {
  "apikey": KEY,
  "Authorization": `Bearer ${KEY}`,
  "Content-Type": "application/json"
};

let users = [];
let instruments = [];
let bookings = [];
let currentUser = localStorage.getItem("labBookingUser") || null;
let currentInstr = null;

function weekDates() {
  const today = new Date();
  const monday = new Date(today);
  const diff = (today.getDay() === 0 ? -6 : 1 - today.getDay());
  monday.setDate(today.getDate() + diff);

  return Array.from({ length: 5 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d.toISOString().split("T")[0];
  });
}

async function load() {
  users = await fetch(`${URL}/users?select=*`, { headers: HEADERS }).then(r => r.json());
  instruments = await fetch(`${URL}/instruments?select=*`, { headers: HEADERS }).then(r => r.json());
  bookings = await fetch(`${URL}/bookings?select=*`, { headers: HEADERS }).then(r => r.json());

  if (!currentUser || !users.some(u => u.name === currentUser)) {
    currentUser = users[0]?.name || null;
  }

  currentInstr = instruments[0] || null;

  render();
}

function render() {
  renderUsers();
  renderInstr();
  renderMain();
  renderCalendar();
}

function renderUsers() {
  const el = document.getElementById("user");

  el.innerHTML = users.map(u =>
    `<option value="${u.name}" ${u.name === currentUser ? "selected" : ""}>${u.name}</option>`
  ).join("");

  el.value = currentUser || "";

  el.onchange = e => {
    currentUser = e.target.value;
    localStorage.setItem("labBookingUser", currentUser);
    renderCalendar();
  };
}

function renderInstr() {
  const el = document.getElementById("instr");
  el.innerHTML = instruments.map(i =>
    `<button class="${currentInstr && i.id === currentInstr.id ? 'active' : ''}" onclick="selectInstr('${i.id}')">${i.name}</button>`
  ).join("");
}

function selectInstr(id) {
  currentInstr = instruments.find(i => i.id === id) || currentInstr;
  renderInstr();
  renderMain();
  renderCalendar();
}

function renderMain() {
  if (!currentInstr) {
    document.getElementById("title").textContent = "";
    document.getElementById("desc").textContent = "";
    return;
  }

  document.getElementById("title").textContent = currentInstr.name;
  document.getElementById("desc").textContent = currentInstr.description;
}

function renderCalendar() {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  if (!currentInstr) return;

  const days = ["Mon", "Tue", "Wed", "Thu", "Fri"];
  const dates = weekDates();

  cal.appendChild(document.createElement("div"));
  days.forEach(d => {
    const h = document.createElement("div");
    h.className = "cell header";
    h.textContent = d;
    cal.appendChild(h);
  });

  for (let h = 8; h < 20; h++) {
    const t = document.createElement("div");
    t.className = "cell time";
    t.textContent = h + ":00";
    cal.appendChild(t);

    for (let i = 0; i < 5; i++) {
      const date = dates[i];
      const c = document.createElement("div");
      c.className = "cell";

      const b = bookings.find(x =>
        x.instrument === currentInstr.id &&
        x.hour === h &&
        x.date === date
      );

      if (b) {
        c.classList.add("booking");
        c.textContent = b.name;

        if (b.name === currentUser) {
          c.classList.add("mine");
          c.onclick = () => deleteBooking(b);
          c.title = "Click to delete your booking";
        }
      } else {
        c.classList.add("clickable");
        c.onclick = () => book(h, date);
      }

      cal.appendChild(c);
    }
  }
}

async function book(hour, date) {
  if (!currentUser || !currentInstr) return;

  const row = {
    id: Date.now().toString(),
    instrument: currentInstr.id,
    date: date,
    hour: hour,
    name: currentUser,
    note: ""
  };

  await fetch(`${URL}/bookings`, {
    method: "POST",
    headers: HEADERS,
    body: JSON.stringify(row)
  });

  bookings = await fetch(`${URL}/bookings?select=*`, { headers: HEADERS }).then(r => r.json());
  renderCalendar();
}

async function deleteBooking(b) {
  if (!confirm("Delete this booking?")) return;

  await fetch(
    `${URL}/bookings?instrument=eq.${b.instrument}&hour=eq.${b.hour}&date=eq.${b.date}&name=eq.${b.name}`,
    {
      method: "DELETE",
      headers: HEADERS
    }
  );

  bookings = await fetch(`${URL}/bookings?select=*`, { headers: HEADERS }).then(r => r.json());
  renderCalendar();
}

load();
</script>

</body>
</html>
