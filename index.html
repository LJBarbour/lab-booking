<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lab Booking</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { margin:0; font-family: system-ui, -apple-system, sans-serif; display:grid; grid-template-columns:260px 1fr; height:100vh; background:#f6f7fb; }
aside { background:#ffffff; border-right:1px solid #e6e8ef; padding:24px; overflow-y:auto; }
h3 { font-size:11px; text-transform:uppercase; color:#8a8f9c; margin-bottom:10px; }

button {
  width:100%;
  padding:10px;
  margin-bottom:6px;
  border:none;
  background:none;
  text-align:left;
  cursor:pointer;
  border-radius:6px;
}

button:hover { background:#f0f3ff; }

button.active {
  background:#dbe7ff;
  font-weight:600;
  border-left:4px solid #4a6cf7;
  padding-left:6px;
}

#instr-image { width:100%; max-width:140px; margin-top:10px; border-radius:6px; }

main { padding:24px; overflow-y:auto; }

.week-nav { display:flex; gap:10px; margin-bottom:10px; }
.week-nav button { width:auto; padding:6px 10px; }

.calendar {
  display:grid;
  grid-template-columns:60px repeat(7,1fr);
  border:1px solid #e6e8ef;
  border-radius:12px;
  overflow:hidden;
  background:#fff;
}

.cell {
  border:1px solid #e6e8ef;
  height:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.header { background:#fafbff; flex-direction:column; height:50px; }
.date { font-size:14px; font-weight:600; color:#444; }
.header.today-col { background:#ffe082; }
.time { font-size:11px; color:#9aa0ad; justify-content:flex-end; padding-right:8px; }
.cell.clickable:hover { background:#eef2ff; cursor:pointer; }
.cell.needs-login:hover { background:#fff8e1; cursor:pointer; }

.booking-box {
  position:absolute; inset:1px;
  background:#dbe7ff; border-radius:6px;
  display:flex; align-items:center; justify-content:center; font-size:11px;
  overflow:hidden; padding:0 3px; text-align:center;
}
.booking-box.mine { background:#d7f5e3; cursor:pointer; }
.booking-box.past { background:#e0e0e0; color:#888; }
.past-cell { background:#f0f0f0; color:#999; }

/* User area */
#user-badge {
  background:#f0f3ff; border-radius:8px; padding:10px 12px;
  font-size:14px; font-weight:600; color:#1a1d2e;
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:4px;
}
#logout-btn {
  width:auto; padding:4px 10px; font-size:12px;
  background:#fff; border:1px solid #d0d4e0; border-radius:6px;
  color:#555; cursor:pointer; margin-bottom:0;
}
#logout-btn:hover { background:#ffeaea; color:#d32f2f; border-color:#f5b8b8; }

#change-pw-link {
  display:inline-block; font-size:12px; color:#4a6cf7;
  cursor:pointer; margin-bottom:16px; padding:2px 2px;
  background:none; border:none; text-align:left; width:auto;
}
#change-pw-link:hover { text-decoration:underline; background:none; }

#login-btn-sidebar {
  width:100%; padding:11px; background:#4a6cf7; color:#fff;
  border:none; border-radius:8px; font-size:14px; font-weight:600;
  cursor:pointer; text-align:center; margin-bottom:8px;
}
#login-btn-sidebar:hover { background:#3a5ce0; }

#readonly-notice { font-size:12px; color:#9aa0ad; line-height:1.5; margin-bottom:16px; }

/* Shared modal styles */
.modal {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.45); z-index:100;
  align-items:center; justify-content:center;
}
.modal.visible { display:flex; }

.modal-box {
  background:#fff; border-radius:14px; padding:36px 40px;
  width:340px; box-shadow:0 8px 32px rgba(0,0,0,0.18); position:relative;
  box-sizing:border-box;
}
.modal-box h2 { margin:0 0 24px; font-size:20px; color:#1a1d2e; }

.modal-box input {
  width:100%; padding:10px 12px; margin-bottom:14px;
  border:1px solid #d0d4e0; border-radius:8px; font-size:14px; box-sizing:border-box;
}
.modal-box input.error-field { border-color:#e57373; }

.modal-submit {
  width:100%; padding:11px; background:#4a6cf7; color:#fff;
  border:none; border-radius:8px; font-size:15px; font-weight:600;
  cursor:pointer; margin-bottom:0;
}
.modal-submit:hover { background:#3a5ce0; }
.modal-submit:disabled { background:#a0aef7; cursor:not-allowed; }

.modal-error   { color:#d32f2f; font-size:13px; margin-top:10px; min-height:18px; }
.modal-success { color:#2e7d32; font-size:13px; margin-top:10px; min-height:18px; }

.modal-close {
  position:absolute; top:14px; right:16px; background:none; border:none;
  font-size:20px; color:#aaa; cursor:pointer; width:auto; padding:0; margin:0; line-height:1;
}
.modal-close:hover { color:#555; background:none; }

/* Password strength */
#pw-strength-wrap { margin:-6px 0 14px; }
#pw-strength-bar-bg { height:4px; background:#e0e0e0; border-radius:2px; }
#pw-strength-bar    { height:100%; border-radius:2px; width:0%; transition:width .2s,background .2s; }
#pw-strength-label  { font-size:11px; color:#9aa0ad; margin-top:4px; }

/* Error banner */
#error-banner {
  display:none; background:#fdecea; border:1px solid #f5b8b8;
  color:#c62828; padding:10px 14px; border-radius:8px;
  font-size:13px; margin-bottom:14px;
}
</style>
</head>

<body>

<!-- Login modal -->
<div id="login-modal" class="modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('login-modal')">✕</button>
    <h2>🔬 Lab Booking Login</h2>
    <input id="login-email"    type="email"    placeholder="Email address" />
    <input id="login-password" type="password" placeholder="Password"
           onkeydown="if(event.key==='Enter') doLogin()" />
    <button class="modal-submit" onclick="doLogin()">Sign In</button>
    <div class="modal-error" id="login-error"></div>
  </div>
</div>

<!-- Change password modal -->
<div id="pw-modal" class="modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('pw-modal')">✕</button>
    <h2>🔑 Change Password</h2>
    <input id="pw-current" type="password" placeholder="Current password" />
    <input id="pw-new"     type="password" placeholder="New password (min 8 characters)"
           oninput="updateStrength()" />
    <div id="pw-strength-wrap">
      <div id="pw-strength-bar-bg"><div id="pw-strength-bar"></div></div>
      <div id="pw-strength-label"></div>
    </div>
    <input id="pw-confirm" type="password" placeholder="Confirm new password"
           onkeydown="if(event.key==='Enter') doChangePassword()" />
    <button class="modal-submit" id="pw-submit" onclick="doChangePassword()">Update Password</button>
    <div class="modal-error"   id="pw-error"></div>
    <div class="modal-success" id="pw-success"></div>
  </div>
</div>

<aside>
  <h3>Researcher</h3>
  <div id="user-area"></div>
  <div id="error-banner"></div>
  <h3>Instruments</h3>
  <div id="instr"></div>
  <img id="instr-image" src="" alt="" style="display:none">
</aside>

<main>
  <h2 id="title"></h2>
  <div class="week-nav">
    <button onclick="changeWeek(-1)">← Previous</button>
    <button onclick="goToday()">Today</button>
    <button onclick="changeWeek(1)">Next →</button>
  </div>
  <div id="calendar" class="calendar"></div>
  <div id="cal-message" style="color:#9aa0ad; font-size:14px; margin-top:20px;"></div>
</main>

<script>
const SUPABASE_URL = "https://mqpvnisphntdwhqoiqlt.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xcHZuaXNwaG50ZHdocW9pcWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzM5NjIsImV4cCI6MjA5MzE0OTk2Mn0.7eAeXAh0heqiaTLclqUzAeNY2gQDcbxNRe2LrLXvpHg";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const REST = SUPABASE_URL + "/rest/v1";
const HEADERS = {
  "apikey": SUPABASE_KEY,
  "Authorization": `Bearer ${SUPABASE_KEY}`,
  "Content-Type": "application/json"
};

let instruments=[], bookings=[], permissions=[];
let currentUser=null, currentUserEmail=null, currentInstr=null, weekOffset=0;

// ── Modals ────────────────────────────────────────────────────

function openModal(id){
  document.getElementById(id).classList.add("visible");
  if(id === "login-modal"){
    document.getElementById("login-error").textContent = "";
    document.getElementById("login-password").value = "";
    setTimeout(()=>document.getElementById("login-email").focus(), 50);
  }
  if(id === "pw-modal"){
    ["pw-current","pw-new","pw-confirm"].forEach(f=>{
      document.getElementById(f).value = "";
      document.getElementById(f).classList.remove("error-field");
    });
    document.getElementById("pw-error").textContent   = "";
    document.getElementById("pw-success").textContent = "";
    document.getElementById("pw-strength-bar").style.width = "0%";
    document.getElementById("pw-strength-label").textContent = "";
    setTimeout(()=>document.getElementById("pw-current").focus(), 50);
  }
}

function closeModal(id){
  document.getElementById(id).classList.remove("visible");
}

// ── Password strength ─────────────────────────────────────────

function updateStrength(){
  const val  = document.getElementById("pw-new").value;
  const bar  = document.getElementById("pw-strength-bar");
  const lbl  = document.getElementById("pw-strength-label");

  let score = 0;
  if(val.length >= 8)           score++;
  if(val.length >= 12)          score++;
  if(/[A-Z]/.test(val))         score++;
  if(/[0-9]/.test(val))         score++;
  if(/[^A-Za-z0-9]/.test(val)) score++;

  const levels = [
    { pct:"0%",   color:"#e0e0e0", label:"" },
    { pct:"20%",  color:"#e53935", label:"Very weak" },
    { pct:"40%",  color:"#fb8c00", label:"Weak" },
    { pct:"60%",  color:"#fdd835", label:"Fair" },
    { pct:"80%",  color:"#43a047", label:"Strong" },
    { pct:"100%", color:"#2e7d32", label:"Very strong" },
  ];

  const lvl = levels[Math.min(score, 5)];
  bar.style.width      = val.length ? lvl.pct : "0%";
  bar.style.background = lvl.color;
  lbl.textContent      = val.length ? lvl.label : "";
}

// ── Auth ──────────────────────────────────────────────────────

function showError(msg){
  const el = document.getElementById("error-banner");
  el.textContent   = msg;
  el.style.display = msg ? "block" : "none";
}

async function doLogin(){
  const email    = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  const errEl    = document.getElementById("login-error");
  errEl.textContent = "";

  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ errEl.textContent = error.message; return; }

  const res  = await fetch(`${REST}/users?id=eq.${data.user.id}&select=*`, { headers: HEADERS });
  const rows = await res.json();
  if(!rows.length){
    errEl.textContent = "No researcher account linked to this login.";
    await sb.auth.signOut();
    return;
  }

  currentUser      = rows[0].name;
  currentUserEmail = data.user.email;
  closeModal("login-modal");
  render();
}

async function doLogout(){
  await sb.auth.signOut();
  currentUser      = null;
  currentUserEmail = null;
  currentInstr     = instruments[0] || null;
  render();
}

async function doChangePassword(){
  const current   = document.getElementById("pw-current").value;
  const newPw     = document.getElementById("pw-new").value;
  const confirm   = document.getElementById("pw-confirm").value;
  const errEl     = document.getElementById("pw-error");
  const okEl      = document.getElementById("pw-success");
  const submitBtn = document.getElementById("pw-submit");

  errEl.textContent = "";
  okEl.textContent  = "";
  ["pw-current","pw-new","pw-confirm"].forEach(f =>
    document.getElementById(f).classList.remove("error-field")
  );

  // Validate
  if(!current){
    errEl.textContent = "Please enter your current password.";
    document.getElementById("pw-current").classList.add("error-field");
    return;
  }
  if(newPw.length < 8){
    errEl.textContent = "New password must be at least 8 characters.";
    document.getElementById("pw-new").classList.add("error-field");
    return;
  }
  if(newPw !== confirm){
    errEl.textContent = "Passwords do not match.";
    document.getElementById("pw-confirm").classList.add("error-field");
    return;
  }
  if(current === newPw){
    errEl.textContent = "New password must differ from your current password.";
    document.getElementById("pw-new").classList.add("error-field");
    return;
  }

  submitBtn.disabled     = true;
  submitBtn.textContent  = "Updating…";

  // Verify current password by re-authenticating
  const { error: authErr } = await sb.auth.signInWithPassword({
    email: currentUserEmail, password: current
  });
  if(authErr){
    errEl.textContent = "Current password is incorrect.";
    document.getElementById("pw-current").classList.add("error-field");
    submitBtn.disabled    = false;
    submitBtn.textContent = "Update Password";
    return;
  }

  // Apply the new password
  const { error: updateErr } = await sb.auth.updateUser({ password: newPw });
  submitBtn.disabled    = false;
  submitBtn.textContent = "Update Password";

  if(updateErr){ errEl.textContent = updateErr.message; return; }

  okEl.textContent = "✓ Password updated successfully.";
  ["pw-current","pw-new","pw-confirm"].forEach(f => document.getElementById(f).value = "");
  document.getElementById("pw-strength-bar").style.width    = "0%";
  document.getElementById("pw-strength-label").textContent  = "";
  setTimeout(()=>closeModal("pw-modal"), 2000);
}

// ── Data ──────────────────────────────────────────────────────

async function load(){
  showError("");
  try {
    const [i, b, p] = await Promise.all([
      fetch(`${REST}/instruments?select=*`, {headers:HEADERS}).then(r=>r.json()),
      fetch(`${REST}/bookings?select=*`,    {headers:HEADERS}).then(r=>r.json()),
      fetch(`${REST}/permissions?select=*`, {headers:HEADERS}).then(r=>r.json()),
    ]);
    if(i.code || b.code || p.code)
      throw new Error(i.message || b.message || p.message || "Database error");

    instruments  = i;
    bookings     = b;
    permissions  = p;
    currentInstr = instruments[0] || null;
  } catch(err){
    showError("Could not load data: " + err.message);
  }
}

// ── Render ────────────────────────────────────────────────────

function render(){
  renderUserArea();
  renderInstr();
  renderTitle();
  renderImage();
  renderCalendar();
}

function renderUserArea(){
  const el = document.getElementById("user-area");
  if(currentUser){
    el.innerHTML = `
      <div id="user-badge">
        <span>${currentUser}</span>
        <button id="logout-btn" onclick="doLogout()">Logout</button>
      </div>
      <button id="change-pw-link" onclick="openModal('pw-modal')">🔑 Change password</button>`;
  } else {
    el.innerHTML = `
      <button id="login-btn-sidebar" onclick="openModal('login-modal')">Login</button>
      <p id="readonly-notice">Browse the calendar without logging in, or log in to make and edit bookings.</p>`;
  }
}

function renderInstr(){
  const el = document.getElementById("instr");
  const visible = currentUser
    ? instruments.filter(i => permissions.some(p => p.user_id===currentUser && p.instrument_id===i.id))
    : instruments;

  if(!visible.find(i => currentInstr && i.id===currentInstr.id))
    currentInstr = visible[0] || null;

  el.innerHTML = visible.length
    ? visible.map(i =>
        `<button class="${currentInstr && i.id===currentInstr.id ? 'active' : ''}"
                 onclick="selectInstr('${i.id}')">${i.name}</button>`
      ).join("")
    : `<p style="font-size:13px;color:#9aa0ad">No instruments available.</p>`;
}

function selectInstr(id){ currentInstr = instruments.find(i=>i.id===id); render(); }
function renderTitle(){ document.getElementById("title").textContent = currentInstr?.description || ""; }
function renderImage(){
  const img = document.getElementById("instr-image");
  if(currentInstr){ img.src = currentInstr.id+".jpg"; img.style.display="block"; }
  else             { img.style.display="none"; }
}

function norm(s){ return (s||"").trim().toLowerCase(); }
function goToday(){ weekOffset=0; renderCalendar(); }
function changeWeek(delta){ weekOffset+=delta; renderCalendar(); }

function weekDates(){
  const today=new Date();
  const diff=(today.getDay()===0?-6:1-today.getDay());
  const monday=new Date(today);
  monday.setDate(today.getDate()+diff+weekOffset*7);
  return Array.from({length:7},(_,i)=>{
    const d=new Date(monday); d.setDate(monday.getDate()+i); return d;
  });
}

function renderCalendar(){
  const cal=document.getElementById("calendar");
  const msg=document.getElementById("cal-message");
  cal.innerHTML=""; msg.textContent="";

  if(!currentInstr){
    msg.textContent = instruments.length
      ? "Select an instrument to view the calendar."
      : "No instruments loaded — check your connection.";
    return;
  }

  const days=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  const dates=weekDates();
  const now=new Date();
  const todayStr=now.toISOString().split("T")[0];

  cal.appendChild(document.createElement("div"));
  days.forEach((d,i)=>{
    const h=document.createElement("div");
    const dateStr=dates[i].toISOString().split("T")[0];
    h.className="cell header"+(dateStr===todayStr?" today-col":"");
    h.innerHTML=`${d}<div class="date">${dateStr}</div>`;
    cal.appendChild(h);
  });

  for(let h=0;h<24;h++){
    const t=document.createElement("div");
    t.className="cell time";
    t.textContent=h.toString().padStart(2,'0')+":00";
    cal.appendChild(t);

    for(let i=0;i<7;i++){
      const dateStr=dates[i].toISOString().split("T")[0];
      const c=document.createElement("div");
      const slotTime=new Date(dateStr+"T"+h.toString().padStart(2,'0')+":00");
      const isPast=slotTime<now;
      c.className="cell"+(isPast?" past-cell":"");

      const b=bookings.find(x=>x.instrument===currentInstr.id&&x.hour===h&&x.date===dateStr);
      if(b){
        const mine=currentUser&&norm(b.name)===norm(currentUser);
        c.innerHTML=`<div class="booking-box ${mine?'mine':''} ${isPast?'past':''}">${b.name}</div>`;
        if(mine&&!isPast) c.onclick=()=>deleteBooking(b);
      } else if(!isPast){
        if(currentUser){ c.classList.add("clickable"); c.onclick=()=>book(h,dateStr); }
        else            { c.classList.add("needs-login"); c.onclick=()=>openModal("login-modal"); }
      }
      cal.appendChild(c);
    }
  }
}

// ── Booking actions ───────────────────────────────────────────

async function book(hour,date){
  if(!currentUser){ openModal("login-modal"); return; }
  const now=new Date();
  const slotTime=new Date(date+"T"+hour.toString().padStart(2,'0')+":00");
  if(slotTime<now){ alert("Cannot book in the past"); return; }
  const maxDays=currentInstr.advancedays??999;
  const maxDate=new Date(); maxDate.setDate(now.getDate()+maxDays);
  if(slotTime>maxDate){ alert("Booking too far in advance"); return; }
  const count=bookings.filter(b=>{
    const t=new Date(b.date+"T"+b.hour.toString().padStart(2,'0')+":00");
    return norm(b.name)===norm(currentUser)&&b.instrument===currentInstr.id&&t>=now;
  }).length;
  if(count>=(currentInstr.maxslot??999)){ alert("Booking limit reached"); return; }

  await fetch(`${REST}/bookings`,{
    method:"POST", headers:HEADERS,
    body:JSON.stringify({ id:Date.now().toString(), instrument:currentInstr.id, date, hour, name:currentUser })
  });
  bookings=await fetch(`${REST}/bookings?select=*`,{headers:HEADERS}).then(r=>r.json());
  renderCalendar();
}

async function deleteBooking(b){
  if(!currentUser){ openModal("login-modal"); return; }
  if(!confirm("Delete this booking?")) return;
  await fetch(
    `${REST}/bookings?instrument=eq.${b.instrument}&hour=eq.${b.hour}&date=eq.${b.date}&name=eq.${b.name}`,
    { method:"DELETE", headers:HEADERS }
  );
  bookings=await fetch(`${REST}/bookings?select=*`,{headers:HEADERS}).then(r=>r.json());
  renderCalendar();
}

// ── Boot ─────────────────────────────────────────────────────

(async()=>{
  renderUserArea();
  const [, sessionResult] = await Promise.all([load(), sb.auth.getSession()]);
  const session = sessionResult?.data?.session;
  if(session?.user){
    const res  = await fetch(`${REST}/users?id=eq.${session.user.id}&select=*`, { headers: HEADERS });
    const rows = await res.json();
    if(rows.length){
      currentUser      = rows[0].name;
      currentUserEmail = session.user.email;
    }
  }
  render();
})();
</script>
</body>
</html>
