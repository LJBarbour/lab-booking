<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lab Booking</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { margin:0; font-family: system-ui, -apple-system, sans-serif; display:grid; grid-template-columns:260px 1fr; height:100vh; background:#f6f7fb; }
aside { background:#ffffff; border-right:1px solid #e6e8ef; padding:24px; }
h3 { font-size:11px; text-transform:uppercase; color:#8a8f9c; margin-bottom:10px; }

button {
  width:100%;
  padding:10px;
  margin-bottom:6px;
  border:none;
  background:none;
  text-align:left;
  cursor:pointer;
}

button:hover { background:#f0f3ff; }

button.active {
  background:#dbe7ff;
  font-weight:600;
  border-left:4px solid #4a6cf7;
  padding-left:6px;
  border-radius:4px;
}

#instr-image {
  width:100%;
  max-width:140px;
  margin-top:10px;
  border-radius:6px;
}

main { padding:24px; }

.week-nav {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.week-nav button {
  width:auto;
  padding:6px 10px;
}

.calendar {
  display:grid;
  grid-template-columns:60px repeat(7,1fr);
  border:1px solid #e6e8ef;
  border-radius:12px;
  overflow:hidden;
  background:#fff;
}

.cell {
  border:1px solid #e6e8ef;
  height:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.header {
  background:#fafbff;
  flex-direction:column;
  height:50px;
}

.date {
  font-size:14px;
  font-weight:600;
  color:#444;
}

.header.today-col {
  background:#ffe082;
}

.time { font-size:11px; color:#9aa0ad; justify-content:flex-end; padding-right:8px; }

.cell.clickable:hover {
  background:#eef2ff;
  cursor:pointer;
}

.booking-box {
  position:absolute;
  inset:1px;
  background:#dbe7ff;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.booking-box.mine {
  background:#d7f5e3;
  cursor:pointer;
}

.booking-box.past {
  background:#e0e0e0;
  color:#888;
}

.past-cell {
  background:#f0f0f0;
  color:#999;
}

/* ── Login overlay ── */
#login-overlay {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:100;
  align-items:center;
  justify-content:center;
}

#login-overlay.visible {
  display:flex;
}

#login-box {
  background:#fff;
  border-radius:14px;
  padding:36px 40px;
  width:340px;
  box-shadow:0 8px 32px rgba(0,0,0,0.18);
}

#login-box h2 {
  margin:0 0 24px;
  font-size:20px;
  color:#1a1d2e;
}

#login-box input {
  width:100%;
  padding:10px 12px;
  margin-bottom:14px;
  border:1px solid #d0d4e0;
  border-radius:8px;
  font-size:14px;
  box-sizing:border-box;
}

#login-btn {
  width:100%;
  padding:11px;
  background:#4a6cf7;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}

#login-btn:hover { background:#3a5ce0; }

#login-error {
  color:#d32f2f;
  font-size:13px;
  margin-top:10px;
  min-height:18px;
}

/* ── User badge in sidebar ── */
#user-badge {
  background:#f0f3ff;
  border-radius:8px;
  padding:10px 12px;
  margin-bottom:20px;
  font-size:14px;
  font-weight:600;
  color:#1a1d2e;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

#logout-btn {
  width:auto;
  padding:4px 10px;
  font-size:12px;
  background:#fff;
  border:1px solid #d0d4e0;
  border-radius:6px;
  color:#555;
  cursor:pointer;
  margin-bottom:0;
}

#logout-btn:hover { background:#ffeaea; color:#d32f2f; border-color:#f5b8b8; }
</style>
</head>

<body>

<!-- Login overlay -->
<div id="login-overlay" class="visible">
  <div id="login-box">
    <h2>🔬 Lab Booking Login</h2>
    <input id="login-email" type="email" placeholder="Email address" />
    <input id="login-password" type="password" placeholder="Password" />
    <button id="login-btn" onclick="doLogin()">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<aside>
  <h3>Researcher</h3>
  <div id="user-badge">
    <span id="user-name">—</span>
    <button id="logout-btn" onclick="doLogout()">Logout</button>
  </div>

  <h3>Instruments</h3>
  <div id="instr"></div>

  <img id="instr-image" src="" alt="">
</aside>

<main>
  <h2 id="title"></h2>

  <div class="week-nav">
    <button onclick="changeWeek(-1)">← Previous</button>
    <button onclick="goToday()">Today</button>
    <button onclick="changeWeek(1)">Next →</button>
  </div>

  <div id="calendar" class="calendar"></div>
</main>

<script>

const SUPABASE_URL = "https://mqpvnisphntdwhqoiqlt.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xcHZuaXNwaG50ZHdocW9pcWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzM5NjIsImV4cCI6MjA5MzE0OTk2Mn0.7eAeXAh0heqiaTLclqUzAeNY2gQDcbxNRe2LrLXvpHg";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const REST = SUPABASE_URL + "/rest/v1";
const HEADERS = {
  "apikey": SUPABASE_KEY,
  "Authorization": `Bearer ${SUPABASE_KEY}`,
  "Content-Type": "application/json"
};

let instruments=[], bookings=[], permissions=[];
let currentUser=null;   // display name from users table
let currentInstr=null;
let weekOffset = 0;

// ── Auth ──────────────────────────────────────────────────────

async function doLogin(){
  const email    = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  const errEl    = document.getElementById("login-error");
  errEl.textContent = "";

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if(error){
    errEl.textContent = error.message;
    return;
  }

  await initAfterAuth(data.user);
}

async function doLogout(){
  await sb.auth.signOut();
  currentUser  = null;
  currentInstr = null;
  document.getElementById("user-name").textContent = "—";
  document.getElementById("calendar").innerHTML = "";
  document.getElementById("instr").innerHTML = "";
  document.getElementById("title").textContent = "";
  document.getElementById("instr-image").src = "";
  document.getElementById("login-overlay").classList.add("visible");
  document.getElementById("login-error").textContent = "";
  document.getElementById("login-password").value = "";
}

async function initAfterAuth(authUser){
  // Look up the researcher record whose id matches the auth user's UUID
  const res = await fetch(
    `${REST}/users?id=eq.${authUser.id}&select=*`,
    { headers: HEADERS }
  );
  const rows = await res.json();

  if(!rows.length){
    document.getElementById("login-error").textContent =
      "No researcher account linked to this login.";
    await sb.auth.signOut();
    return;
  }

  currentUser = rows[0].name;
  document.getElementById("user-name").textContent = currentUser;
  document.getElementById("login-overlay").classList.remove("visible");

  await load();
}

// ── Data ──────────────────────────────────────────────────────

async function load(){
  [instruments, bookings, permissions] = await Promise.all([
    fetch(`${REST}/instruments?select=*`, {headers:HEADERS}).then(r=>r.json()),
    fetch(`${REST}/bookings?select=*`,    {headers:HEADERS}).then(r=>r.json()),
    fetch(`${REST}/permissions?select=*`, {headers:HEADERS}).then(r=>r.json()),
  ]);

  currentInstr = null;
  render();
}

// ── Render ────────────────────────────────────────────────────

function render(){
  renderInstr();
  renderTitle();
  renderImage();
  renderCalendar();
}

function renderInstr(){
  const el = document.getElementById("instr");

  const allowed = instruments.filter(i =>
    permissions.some(p =>
      p.user_id === currentUser &&
      p.instrument_id === i.id
    )
  );

  if(!allowed.find(i => currentInstr && i.id === currentInstr.id)){
    currentInstr = allowed[0] || null;
  }

  el.innerHTML = allowed.map(i =>
    `<button class="${currentInstr && i.id===currentInstr.id ? 'active' : ''}" onclick="selectInstr('${i.id}')">${i.name}</button>`
  ).join("");
}

function selectInstr(id){
  currentInstr = instruments.find(i=>i.id===id);
  render();
}

function renderTitle(){
  document.getElementById("title").textContent = currentInstr?.description || "";
}

function renderImage(){
  const img = document.getElementById("instr-image");
  img.src = currentInstr ? currentInstr.id + ".jpg" : "";
}

function norm(s){ return (s||"").trim().toLowerCase(); }
function goToday(){ weekOffset=0; renderCalendar(); }
function changeWeek(delta){ weekOffset+=delta; renderCalendar(); }

function weekDates(){
  const today=new Date();
  const diff=(today.getDay()===0?-6:1-today.getDay());
  const monday=new Date(today);
  monday.setDate(today.getDate()+diff+weekOffset*7);
  return Array.from({length:7},(_,i)=>{
    const d=new Date(monday);
    d.setDate(monday.getDate()+i);
    return d;
  });
}

function renderCalendar(){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";
  if(!currentInstr) return;

  const days=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  const dates=weekDates();
  const now=new Date();
  const todayStr=now.toISOString().split("T")[0];

  cal.appendChild(document.createElement("div"));

  days.forEach((d,i)=>{
    const h=document.createElement("div");
    const dateStr=dates[i].toISOString().split("T")[0];
    const isToday=dateStr===todayStr;
    h.className="cell header"+(isToday?" today-col":"");
    h.innerHTML=`${d}<div class="date">${dateStr}</div>`;
    cal.appendChild(h);
  });

  for(let h=0;h<24;h++){
    const t=document.createElement("div");
    t.className="cell time";
    t.textContent=h.toString().padStart(2,'0')+":00";
    cal.appendChild(t);

    for(let i=0;i<7;i++){
      const dateStr=dates[i].toISOString().split("T")[0];
      const c=document.createElement("div");
      const slotTime=new Date(dateStr+"T"+h.toString().padStart(2,'0')+":00");
      const isPast=slotTime<now;

      c.className="cell"+(isPast?" past-cell":"");

      const b=bookings.find(x=>
        x.instrument===currentInstr.id &&
        x.hour===h &&
        x.date===dateStr
      );

      if(b){
        const mine=norm(b.name)===norm(currentUser);
        const pastClass=isPast?"past":"";
        c.innerHTML=`<div class="booking-box ${mine?'mine':''} ${pastClass}">${b.name}</div>`;
        if(mine&&!isPast) c.onclick=()=>deleteBooking(b);
      } else if(!isPast){
        c.classList.add("clickable");
        c.onclick=()=>book(h,dateStr);
      }

      cal.appendChild(c);
    }
  }
}

// ── Booking actions ───────────────────────────────────────────

async function book(hour,date){
  const now=new Date();
  const slotTime=new Date(date+"T"+hour.toString().padStart(2,'0')+":00");
  if(slotTime<now){ alert("Cannot book in the past"); return; }

  const maxDays=currentInstr.advancedays??999;
  const maxDate=new Date();
  maxDate.setDate(now.getDate()+maxDays);
  if(slotTime>maxDate){ alert("Booking too far in advance"); return; }

  const count=bookings.filter(b=>{
    const t=new Date(b.date+"T"+b.hour.toString().padStart(2,'0')+":00");
    return norm(b.name)===norm(currentUser) && b.instrument===currentInstr.id && t>=now;
  }).length;

  if(count>=(currentInstr.maxslot??999)){ alert("Booking limit reached"); return; }

  await fetch(`${REST}/bookings`,{
    method:"POST",
    headers:HEADERS,
    body:JSON.stringify({
      id:Date.now().toString(),
      instrument:currentInstr.id,
      date,
      hour,
      name:currentUser
    })
  });

  bookings=await fetch(`${REST}/bookings?select=*`,{headers:HEADERS}).then(r=>r.json());
  renderCalendar();
}

async function deleteBooking(b){
  if(!confirm("Delete this booking?")) return;

  await fetch(
    `${REST}/bookings?instrument=eq.${b.instrument}&hour=eq.${b.hour}&date=eq.${b.date}&name=eq.${b.name}`,
    { method:"DELETE", headers:HEADERS }
  );

  bookings=await fetch(`${REST}/bookings?select=*`,{headers:HEADERS}).then(r=>r.json());
  renderCalendar();
}

// ── Boot: check for existing session ─────────────────────────

(async()=>{
  const { data:{ session } } = await sb.auth.getSession();
  if(session?.user){
    await initAfterAuth(session.user);
  }
  // otherwise the overlay stays visible
})();

</script>
</body>
</html>
