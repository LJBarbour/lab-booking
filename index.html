<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lab Booking</title>

<style>
body { margin:0; font-family: system-ui; display:grid; grid-template-columns:260px 1fr; height:100vh; background:#f6f7fb; }
aside { background:#fff; border-right:1px solid #ddd; padding:20px; }
main { padding:20px; }

button { width:100%; margin-bottom:6px; padding:8px; border:none; cursor:pointer; }
button.active { background:#dbe7ff; font-weight:bold; }

.calendar { display:grid; grid-template-columns:60px repeat(7,1fr); }
.cell { border:1px solid #ddd; height:26px; display:flex; align-items:center; justify-content:center; }
.time { font-size:11px; color:#888; justify-content:flex-end; padding-right:6px; }

.booking { background:#dbe7ff; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
.mine { background:#d7f5e3; }

#auth { margin-bottom:20px; }
</style>
</head>

<body>

<aside>

<div id="auth">
<button onclick="init()">Init</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<div id="user-email">Not logged in</div>
<div id="user-name" style="font-size:12px;"></div>
</div>

<h3>Instruments</h3>
<div id="instr"></div>

</aside>

<main>
<h2 id="title"></h2>
<div id="calendar" class="calendar"></div>
</main>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

console.log("VERSION 1.3.1");

const URL = "https://mqpvnisphntdwhqoiqlt.supabase.co";

const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xcHZuaXNwaG50ZHdocW9pcWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzM5NjIsImV4cCI6MjA5MzE0OTk2Mn0.7eAeXAh0heqiaTLclqUzAeNY2gQDcbxNRe2LrLXvpHg";

const REST = URL + "/rest/v1";

const HEADERS = {
  "apikey": KEY,
  "Authorization": `Bearer ${KEY}`,
  "Content-Type": "application/json"
};

let sb = null;
let currentUser = null;
let currentUserName = null;

let instruments = [];
let bookings = [];
let permissions = [];

let currentInstr = null;

function norm(s){ return (s||"").toLowerCase(); }

async function init(){
  sb = createClient(URL, KEY);
  await resolveUser();
  await load();
}

async function login(){
  if(!sb){ alert("Init first"); return; }

  const email = prompt("Email:");
  const password = prompt("Password:");

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if(error){
    alert(error.message);
    return;
  }

  await resolveUser();
  await load();
}

async function logout(){
  if(!sb) return;
  await sb.auth.signOut();

  currentUser = null;
  currentUserName = null;

  document.getElementById("user-email").textContent = "Not logged in";
  document.getElementById("user-name").textContent = "";

  render();
}

async function resolveUser(){

  const { data } = await sb.auth.getUser();

  if(!data.user){
    currentUser = null;
    currentUserName = null;
    return;
  }

  currentUser = data.user;
  document.getElementById("user-email").textContent = currentUser.email;

  const res = await fetch(`${REST}/users?auth_id=eq.${currentUser.id}`, {headers:HEADERS});
  const rows = await res.json();

  if(!rows.length){
    alert("Access denied: no matching user record");
    await logout();
    return;
  }

  currentUserName = rows[0].name;
  document.getElementById("user-name").textContent = currentUserName;
}

async function load(){

  instruments = await fetch(`${REST}/instruments?select=*`, {headers:HEADERS}).then(r=>r.json());
  bookings = await fetch(`${REST}/bookings?select=*`, {headers:HEADERS}).then(r=>r.json());
  permissions = await fetch(`${REST}/permissions?select=*`, {headers:HEADERS}).then(r=>r.json());

  if(!currentInstr && instruments.length){
    currentInstr = instruments[0];
  }

  render();
}

function render(){
  renderInstr();
  renderCalendar();
}

function renderInstr(){

  const el = document.getElementById("instr");

  if(!currentUserName){
    el.innerHTML = instruments.map(i =>
      `<button onclick="selectInstr('${i.id}')">${i.name}</button>`
    ).join("");
    return;
  }

  const allowed = instruments.filter(i =>
    permissions.some(p => p.user_id === currentUserName && p.instrument_id === i.id)
  );

  el.innerHTML = allowed.map(i =>
    `<button onclick="selectInstr('${i.id}')">${i.name}</button>`
  ).join("");
}

window.selectInstr = function(id){
  currentInstr = instruments.find(i=>i.id===id);
  document.getElementById("title").textContent = currentInstr?.description || "";
  renderCalendar();
}

function renderCalendar(){

  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  if(!currentInstr){
    cal.innerHTML = "<div>No instrument selected</div>";
    return;
  }

  for(let h=0; h<24; h++){

    const t = document.createElement("div");
    t.className="cell time";
    t.textContent = h+":00";
    cal.appendChild(t);

    for(let d=0; d<7; d++){

      const c = document.createElement("div");
      c.className="cell";

      const b = bookings.find(x =>
        x.instrument === currentInstr.id &&
        x.hour === h
      );

      if(b){
        const mine = norm(b.name) === norm(currentUserName);
        c.innerHTML = `<div class="booking ${mine?'mine':''}">${b.name}</div>`;

        if(mine){
          c.onclick = ()=>deleteBooking(b);
        }

      } else if(currentUserName){
        c.onclick = ()=>book(h);
      }

      cal.appendChild(c);
    }
  }
}

async function book(hour){

  if(!currentUserName){
    alert("Login required");
    return;
  }

  await fetch(`${REST}/bookings`,{
    method:"POST",
    headers:HEADERS,
    body:JSON.stringify({
      id: Date.now().toString(),
      instrument: currentInstr.id,
      hour,
      date: new Date().toISOString().split("T")[0],
      name: currentUserName,
      user_id: currentUser.id
    })
  });

  await load();
}

async function deleteBooking(b){

  await fetch(`${REST}/bookings?id=eq.${b.id}`,{
    method:"DELETE",
    headers:HEADERS
  });

  await load();
}

</script>
</body>
</html>
