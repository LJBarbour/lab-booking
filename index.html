<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lab Booking</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { margin:0; font-family: system-ui; display:grid; grid-template-columns:260px 1fr; height:100vh; background:#f6f7fb; }
aside { background:#fff; border-right:1px solid #e6e8ef; padding:24px; }
main { padding:24px; }

.calendar {
  display:grid;
  grid-template-columns:60px repeat(7,1fr);
  border:1px solid #e6e8ef;
  border-radius:12px;
  overflow:hidden;
  background:#fff;
}

.cell {
  border:1px solid #e6e8ef;
  height:26px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.header { height:50px; background:#fafbff; flex-direction:column; }

.time { font-size:11px; color:#9aa0ad; justify-content:flex-end; padding-right:8px; }

.booking { background:#dbe7ff; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
</style>
</head>

<body>

<aside>
<div id="auth">
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
  <div id="status">Not logged in</div>
</div>

<h3>Instruments</h3>
<div id="instr"></div>
</aside>

<main>
<h2 id="title"></h2>
<div id="calendar" class="calendar"></div>
</main>

<script>

// ---------- DATA ----------
const REST = "https://mqpvnisphntdwhqoiqlt.supabase.co/rest/v1";
const BASE = "https://mqpvnisphntdwhqoiqlt.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // full key

const HEADERS = {
  apikey: KEY,
  Authorization: `Bearer ${KEY}`,
  "Content-Type": "application/json"
};

let users=[], instruments=[], bookings=[];
let currentUser=null;
let currentInstr=null;

// ---------- SAFE AUTH ----------
let sb = null;

function initAuth(){
  try {
    sb = window.supabase.createClient(BASE, KEY);
    console.log("Auth ready");
  } catch(e){
    console.warn("Auth disabled:", e.message);
    sb = null;
  }
}

// ---------- LOAD ----------
async function load(){
  users = await fetch(`${REST}/users?select=*`, {headers:HEADERS}).then(r=>r.json());
  instruments = await fetch(`${REST}/instruments?select=*`, {headers:HEADERS}).then(r=>r.json());
  bookings = await fetch(`${REST}/bookings?select=*`, {headers:HEADERS}).then(r=>r.json());

  currentUser = users[0]?.name;
  currentInstr = instruments[0];

  render();
}

// ---------- RENDER ----------
function render(){
  renderInstr();
  renderCalendar();
}

function renderInstr(){
  const el = document.getElementById("instr");
  el.innerHTML = instruments.map(i =>
    `<button onclick="selectInstr('${i.id}')">${i.name}</button>`
  ).join("");
}

function selectInstr(id){
  currentInstr = instruments.find(i=>i.id===id);
  render();
}

function weekDates(){
  const today = new Date();
  const monday = new Date(today);
  const diff = (today.getDay()===0?-6:1-today.getDay());
  monday.setDate(today.getDate()+diff);

  return Array.from({length:7},(_,i)=>{
    const d=new Date(monday);
    d.setDate(monday.getDate()+i);
    return d;
  });
}

function renderCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML="";

  const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const dates=weekDates();

  cal.appendChild(document.createElement("div"));

  days.forEach((d,i)=>{
    const h=document.createElement("div");
    h.className="cell header";
    h.innerHTML = d + "<div>" + dates[i].toISOString().split("T")[0] + "</div>";
    cal.appendChild(h);
  });

  for(let h=0;h<24;h++){
    const t=document.createElement("div");
    t.className="cell time";
    t.textContent=h+":00";
    cal.appendChild(t);

    for(let i=0;i<7;i++){
      const dateStr = dates[i].toISOString().split("T")[0];
      const c=document.createElement("div");

      const b = bookings.find(x =>
        x.instrument===currentInstr.id &&
        x.hour===h &&
        x.date===dateStr
      );

      if(b){
        c.innerHTML = `<div class="booking">${b.name}</div>`;
      }

      cal.appendChild(c);
    }
  }
}

// ---------- AUTH ACTIONS ----------
async function login(){
  if(!sb){
    alert("Auth not available");
    return;
  }

  const email = prompt("Email:");
  const password = prompt("Password:");

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if(error){
    alert(error.message);
    return;
  }

  document.getElementById("status").textContent = data.user.email;
}

async function logout(){
  if(sb){
    await sb.auth.signOut();
  }
  document.getElementById("status").textContent = "Not logged in";
}

// ---------- START ----------
load();
setTimeout(initAuth, 0);

</script>
</body>
</html>
