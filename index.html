<head>

<title>Lab Booking</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { margin:0; font-family: system-ui, -apple-system, sans-serif; display:grid; grid-template-columns:260px 1fr; height:100vh; background:#f6f7fb; }
aside { background:#ffffff; border-right:1px solid #e6e8ef; padding:24px; }
h3 { font-size:11px; text-transform:uppercase; color:#8a8f9c; margin-bottom:10px; }

button {
  width:100%;
  padding:10px;
  margin-bottom:6px;
  border:none;
  background:none;
  text-align:left;
  cursor:pointer;
}

button:hover { background:#f0f3ff; }

button.active {
  background:#dbe7ff;
  font-weight:600;
  border-left:4px solid #4a6cf7;
  padding-left:6px;
  border-radius:4px;
}

#instr-image {
  width:100%;
  max-width:140px;
  margin-top:10px;
  border-radius:6px;
}

main { padding:24px; }

.week-nav {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.week-nav button {
  width:auto;
  padding:6px 10px;
}

.calendar {
  display:grid;
  grid-template-columns:60px repeat(7,1fr);
  border:1px solid #e6e8ef;
  border-radius:12px;
  overflow:hidden;
  background:#fff;
}

.cell {
  border:1px solid #e6e8ef;
  height:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.header {
  background:#fafbff;
  flex-direction:column;
  height:50px;
}

.date {
  font-size:14px;
  font-weight:600;
  color:#444;
}

.header.today-col { background:#ffe082; }

.time { font-size:11px; color:#9aa0ad; justify-content:flex-end; padding-right:8px; }

.cell.clickable:hover { background:#eef2ff; cursor:pointer; }
.cell.needs-login:hover { background:#fff8e1; cursor:pointer; }

.booking-box {
  position:absolute;
  inset:1px;
  background:#dbe7ff;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
}

.booking-box.mine { background:#d7f5e3; cursor:pointer; }
.booking-box.past { background:#e0e0e0; color:#888; }

.past-cell { background:#f0f0f0; color:#999; }

/* ── User area in sidebar ── */
#user-area { margin-bottom:20px; }

#user-badge {
  background:#f0f3ff;
  border-radius:8px;
  padding:10px 12px;
  font-size:14px;
  font-weight:600;
  color:#1a1d2e;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

#logout-btn {
  width:auto;
  padding:4px 10px;
  font-size:12px;
  background:#fff;
  border:1px solid #d0d4e0;
  border-radius:6px;
  color:#555;
  cursor:pointer;
  margin-bottom:0;
}

#logout-btn:hover { background:#ffeaea; color:#d32f2f; border-color:#f5b8b8; }

#login-btn-sidebar {
  width:100%;
  padding:10px;
  background:#4a6cf7;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  text-align:center;
  margin-bottom:0;
}

#login-btn-sidebar:hover { background:#3a5ce0; }

/* ── Login modal ── */
#login-modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:100;
  align-items:center;
  justify-content:center;
}

#login-modal.visible { display:flex; }

#login-box {
  background:#fff;
  border-radius:14px;
  padding:36px 40px;
  width:340px;
  box-shadow:0 8px 32px rgba(0,0,0,0.18);
  position:relative;
}

#login-box h2 { margin:0 0 24px; font-size:20px; color:#1a1d2e; }

#login-box input {
  width:100%;
  padding:10px 12px;
  margin-bottom:14px;
  border:1px solid #d0d4e0;
  border-radius:8px;
  font-size:14px;
  box-sizing:border-box;
}

#login-submit {
  width:100%;
  padding:11px;
  background:#4a6cf7;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  margin-bottom:0;
}

#login-submit:hover { background:#3a5ce0; }

#login-error { color:#d32f2f; font-size:13px; margin-top:10px; min-height:18px; }

#modal-close {
  position:absolute;
  top:14px; right:16px;
  background:none;
  border:none;
  font-size:20px;
  color:#aaa;
  cursor:pointer;
  width:auto;
  padding:0;
  margin:0;
  line-height:1;
}

#modal-close:hover { color:#555; background:none; }

/* ── Read-only notice ── */
#readonly-notice {
  font-size:12px;
  color:#9aa0ad;
  margin-top:12px;
  line-height:1.5;
  display:none;
}
</style>
</head>

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const REST = SUPABASE_URL + "/rest/v1";
const HEADERS = {
  "apikey": SUPABASE_KEY,
  "Authorization": `Bearer ${SUPABASE_KEY}`,
  "Content-Type": "application/json"
};

let currentUser = null;   // null = logged out (read-only)

// ── Auth ──────────────────────────────────────────────────────

function openModal(){
  document.getElementById("login-error").textContent = "";
  document.getElementById("login-password").value = "";
  document.getElementById("login-modal").classList.add("visible");
  setTimeout(()=>document.getElementById("login-email").focus(), 50);
}

function closeModal(){
  document.getElementById("login-modal").classList.remove("visible");
}

async function doLogin(){
  const email    = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  const errEl    = document.getElementById("login-error");
  errEl.textContent = "";

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if(error){ errEl.textContent = error.message; return; }

  await initAfterAuth(data.user);
  closeModal();
}

async function doLogout(){
  await sb.auth.signOut();
  currentUser  = null;
  currentInstr = null;
  // Re-render sidebar and calendar in read-only mode;
  // keep instruments visible so people can browse
  render();
}

async function initAfterAuth(authUser){
  const res  = await fetch(`${REST}/users?id=eq.${authUser.id}&select=*`, { headers: HEADERS });
  const rows = await res.json();

  if(!rows.length){
    document.getElementById("login-error").textContent =
      "No researcher account linked to this login.";
    await sb.auth.signOut();
    return;
  }

  currentUser = rows[0].name;
  render();
}

// ── Data ──────────────────────────────────────────────────────

async function load(){
  [instruments, bookings, permissions] = await Promise.all([
    fetch(`${REST}/instruments?select=*`, {headers:HEADERS}).then(r=>r.json()),
    fetch(`${REST}/bookings?select=*`,    {headers:HEADERS}).then(r=>r.json()),
    fetch(`${REST}/permissions?select=*`, {headers:HEADERS}).then(r=>r.json()),
  ]);

  // Default to showing the first instrument regardless of login state
  if(!currentInstr && instruments.length) currentInstr = instruments[0];

  render();
}

// ── Render ────────────────────────────────────────────────────

function render(){
  renderUserArea();
  renderInstr();
  renderTitle();
  renderImage();
  renderCalendar();
}

function renderUserArea(){
  const el = document.getElementById("user-area");
  if(currentUser){
    el.innerHTML = `
      <div id="user-badge">
        <span>${currentUser}</span>
        <button id="logout-btn" onclick="doLogout()">Logout</button>
      </div>`;
  } else {
    el.innerHTML = `
      <button id="login-btn-sidebar" onclick="openModal()">Login</button>
      <div id="readonly-notice" style="display:block">
        You can browse the calendar without logging in.<br>Log in to make or edit bookings.
      </div>`;
  }
}
