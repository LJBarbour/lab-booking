<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lab Booking</title>

<style>
body { margin:0; font-family: system-ui, -apple-system, sans-serif; display:grid; grid-template-columns:260px 1fr; height:100vh; background:#f6f7fb; }
aside { background:#ffffff; border-right:1px solid #e6e8ef; padding:24px; }
h3 { font-size:11px; text-transform:uppercase; color:#8a8f9c; margin-bottom:10px; }
select { width:100%; padding:10px; margin-bottom:20px; }
button { width:100%; padding:10px; margin-bottom:6px; border:none; background:none; text-align:left; cursor:pointer; }
main { padding:24px; }
#error { color:red; margin-bottom:10px; }
</style>
</head>

<body>

<aside>
  <h3>Researcher</h3>
  <select id="user"></select>

  <h3>Instruments</h3>
  <div id="instr"></div>
</aside>

<main>
  <div id="error"></div>
  <div id="calendar"></div>
</main>

<script>
const URL = "https://mqpvnisphntdwhqoiqlt.supabase.co/rest/v1";
const KEY = "PASTE_YOUR_REAL_KEY_HERE";

const HEADERS = {
  "apikey": KEY,
  "Authorization": `Bearer ${KEY}`
};

let users=[], instruments=[], bookings=[];

async function safeFetch(endpoint){
  const res = await fetch(`${URL}/${endpoint}?select=*`, {headers:HEADERS});
  const data = await res.json();

  if(!res.ok){
    document.getElementById("error").innerText =
      "Supabase error: " + JSON.stringify(data);
    return [];
  }

  return data;
}

async function load(){
  users = await safeFetch("users");
  instruments = await safeFetch("instruments");
  bookings = await safeFetch("bookings");

  render();
}

function render(){
  document.getElementById("user").innerHTML =
    users.map(u=>`<option>${u.name}</option>`).join("");

  document.getElementById("instr").innerHTML =
    instruments.map(i=>`<button>${i.name}</button>`).join("");

  document.getElementById("calendar").innerText =
    bookings.length ? "Calendar loaded" : "No bookings / error";
}

load();
</script>

</body>
</html>
