<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lab Booking</title>

<style>
body { margin:0; font-family:Arial; display:grid; grid-template-columns:250px 1fr; height:100vh; }
aside { padding:20px; background:#f4f4f4; }
main { padding:20px; }

button { width:100%; margin:4px 0; padding:6px; cursor:pointer; }
select { width:100%; margin-bottom:10px; padding:6px; }

.calendar {
  display:grid;
  grid-template-columns:60px repeat(5,1fr);
}

.cell {
  border:1px solid #ddd;
  height:40px;
  font-size:12px;
  padding:4px;
}

.time { text-align:right; background:#eee; }
.header { background:#ddd; text-align:center; font-weight:bold; }
.booking { background:#c8dff5; }

#debug {
  margin-top:10px;
  font-size:11px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<aside>
  <h3>Researcher</h3>
  <select id="user"></select>

  <h3>Instruments</h3>
  <div id="instr"></div>
</aside>

<main>
  <h2 id="title"></h2>
  <div id="calendar" class="calendar"></div>
  <div id="debug"></div>
</main>

<script>
const PROJECT = "mqpvnisphntdwhqoiqlt";   // ← your project ID
const URL = `https://${PROJECT}.supabase.co/rest/v1`;
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // ← your anon key

const HEADERS = {
  "apikey": KEY,
  "Authorization": `Bearer ${KEY}`,
  "Content-Type": "application/json"
};

let users=[], instruments=[], bookings=[];
let currentUser=null, currentInstr=null;

function log(msg){
  document.getElementById("debug").textContent += msg + "\n";
}

function weekDates(){
  const base = new Date();
  const monday = new Date(base);
  const diff = (base.getDay()===0?-6:1-base.getDay());
  monday.setDate(base.getDate()+diff);

  return Array.from({length:5},(_,i)=>{
    const d=new Date(monday);
    d.setDate(monday.getDate()+i);
    return d.toISOString().split("T")[0];
  });
}

async function load(){
  try {
    log("Loading users...");
    const uRes = await fetch(`${URL}/users?select=*`, {headers:HEADERS});
    const uText = await uRes.text();
    log("users raw: " + uText);
    users = JSON.parse(uText);

    log("Loading instruments...");
    const iRes = await fetch(`${URL}/instruments?select=*`, {headers:HEADERS});
    const iText = await iRes.text();
    log("instruments raw: " + iText);
    instruments = JSON.parse(iText);

    log("Loading bookings...");
    const bRes = await fetch(`${URL}/bookings?select=*`, {headers:HEADERS});
    const bText = await bRes.text();
    log("bookings raw: " + bText);
    bookings = JSON.parse(bText);

    if(!Array.isArray(users) || !Array.isArray(instruments)){
      log("ERROR: Not arrays returned");
      return;
    }

    if(!users.length){
      log("ERROR: users table is empty OR wrong project");
      return;
    }

    if(!instruments.length){
      log("ERROR: instruments table is empty OR wrong project");
      return;
    }

    currentUser = users[0].name;
    currentInstr = instruments[0];

    render();

  } catch(e){
    log("ERROR: " + e.message);
  }
}

function render(){
  renderUsers();
  renderInstr();
  renderCalendar();
  document.getElementById("title").textContent = currentInstr.name;
}

function renderUsers(){
  const el = document.getElementById("user");
  el.innerHTML = users.map(u=>`<option>${u.name}</option>`).join("");
  el.onchange = e=>currentUser=e.target.value;
}

function renderInstr(){
  const el = document.getElementById("instr");
  el.innerHTML = instruments.map(i =>
    `<button onclick="selectInstr('${i.id}')">${i.name}</button>`
  ).join("");
}

function selectInstr(id){
  currentInstr = instruments.find(i=>i.id===id);
  render();
}

function renderCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML="";

  const days=["Mon","Tue","Wed","Thu","Fri"];
  const dates=weekDates();

  cal.appendChild(document.createElement("div"));
  days.forEach(d=>{
    const h=document.createElement("div");
    h.className="cell header";
    h.textContent=d;
    cal.appendChild(h);
  });

  for(let h=8;h<20;h++){
    const t=document.createElement("div");
    t.className="cell time";
    t.textContent=h+":00";
    cal.appendChild(t);

    for(let i=0;i<5;i++){
      const date=dates[i];
      const c=document.createElement("div");
      c.className="cell";

      const b = bookings.find(x =>
        x.instrument===currentInstr.id &&
        x.hour===h &&
        x.date===date
      );

      if(b){
        c.textContent=b.name;
        c.classList.add("booking");
      } else {
        c.onclick=()=>book(h,date);
      }

      cal.appendChild(c);
    }
  }
}

async function book(hour,date){
  const row={
    id: Date.now().toString(),
    instrument: currentInstr.id,
    date: date,
    hour: hour,
    name: currentUser,
    note:""
  };

  const res = await fetch(`${URL}/bookings`,{
    method:"POST",
    headers:HEADERS,
    body:JSON.stringify(row)
  });

  log("POST status: " + res.status);

  bookings = await fetch(`${URL}/bookings?select=*`, {headers:HEADERS}).then(r=>r.json());
  renderCalendar();
}

load();
</script>

</body>
</html>
