<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lab Booking</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ── Reset & tokens ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #f0f3f9;
  --sidebar-bg:  #1a1f35;
  --sidebar2:    #242944;
  --border:      #e2e6f0;
  --border-dark: #2e3450;
  --accent:      #4a6cf7;
  --accent-soft: rgba(74,108,247,.1);
  --accent-dark: #3a5ce0;
  --green:       #22c55e;
  --green-soft:  #dcfce7;
  --green-dark:  #16a34a;
  --amber:       #fbbf24;
  --amber-soft:  #fef9c3;
  --red:         #ef4444;
  --red-soft:    #fee2e2;
  --text:        #1a1f35;
  --text-mid:    #4b5470;
  --text-muted:  #8892b0;
  --white:       #ffffff;
  --shadow-sm:   0 1px 3px rgba(26,31,53,.08), 0 1px 2px rgba(26,31,53,.04);
  --shadow-md:   0 4px 16px rgba(26,31,53,.10);
  --shadow-lg:   0 12px 40px rgba(26,31,53,.16);
  --radius:      10px;
  --sans:        'DM Sans', system-ui, sans-serif;
  --mono:        'DM Mono', monospace;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  display: grid;
  grid-template-columns: 256px 1fr;
  grid-template-rows: 52px 1fr;
  height: 100vh;
  overflow: hidden;
}

/* ═══════════════════════════════════════════
   TOP BAR
═══════════════════════════════════════════ */
#topbar {
  grid-column: 1 / -1;
  background: var(--sidebar-bg);
  border-bottom: 1px solid var(--border-dark);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 12px;
}

#topbar .app-logo {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: .1em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}
#topbar .app-logo::before {
  content: "🔬";
  font-size: 16px;
}

#topbar .app-name {
  color: rgba(255,255,255,.35);
  font-weight: 300;
  margin-left: 8px;
  font-family: var(--sans);
  letter-spacing: 0;
  font-size: 13px;
}

/* ═══════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════ */
aside {
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border-dark);
  padding: 20px 16px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 0;
}

aside::-webkit-scrollbar { width: 4px; }
aside::-webkit-scrollbar-track { background: transparent; }
aside::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 2px; }

/* Section labels */
h3 {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: rgba(255,255,255,.3);
  margin: 20px 8px 8px;
}
h3:first-child { margin-top: 4px; }

/* Sidebar buttons (instrument list) */
button {
  width: 100%;
  padding: 9px 12px;
  margin-bottom: 2px;
  border: none;
  background: none;
  text-align: left;
  cursor: pointer;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 400;
  color: rgba(255,255,255,.6);
  transition: background .15s, color .15s;
}
button:hover { background: rgba(255,255,255,.07); color: rgba(255,255,255,.9); }

button.active {
  background: var(--accent-soft);
  background: rgba(74,108,247,.18);
  color: #a5b8ff;
  font-weight: 600;
  border-left: 3px solid var(--accent);
  padding-left: 9px;
}

/* ═══════════════════════════════════════════
   MAIN
═══════════════════════════════════════════ */
main {
  padding: 20px 24px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

main::-webkit-scrollbar { width: 6px; }
main::-webkit-scrollbar-track { background: transparent; }
main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Instrument info bar ── */
#instr-info-bar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  box-shadow: var(--shadow-sm);
  min-height: 0;
}

#instr-info-left {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  flex: 1;
  min-width: 0;
}

#instr-image {
  height: 121px;
  width: auto;
  border-radius: 7px;
  object-fit: cover;
  flex-shrink: 0;
  display: none;
  box-shadow: var(--shadow-sm);
}

#instr-info-text { flex: 1; min-width: 0; padding-top: 2px; }

#instr-description {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 5px;
  line-height: 1.3;
}

#instr-notes {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.55;
  margin-bottom: 8px;
  white-space: pre-wrap;
}

#instr-status { font-size: 12px; font-weight: 500; }

.status-ok {
  color: var(--green-dark);
  background: var(--green-soft);
  padding: 3px 9px;
  border-radius: 20px;
  border: 1px solid #bbf7d0;
  display: inline-block;
}
.status-off {
  color: var(--red);
  background: var(--red-soft);
  padding: 3px 9px;
  border-radius: 20px;
  border: 1px solid #fecaca;
  display: inline-block;
}

/* ── Week nav ── */
.week-nav {
  display: flex;
  gap: 6px;
  align-items: flex-start;
  flex-shrink: 0;
}

.week-nav button {
  width: auto;
  padding: 7px 14px;
  margin-bottom: 0;
  color: var(--text-mid);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  transition: all .15s;
}
.week-nav button:hover {
  background: var(--white);
  border-color: var(--accent);
  color: var(--accent);
}

/* ═══════════════════════════════════════════
   CALENDAR
═══════════════════════════════════════════ */
.calendar {
  display: grid;
  grid-template-columns: 56px repeat(7, 1fr);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--white);
  box-shadow: var(--shadow-sm);
  flex: 1;
}

.cell {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.cell:last-child { border-right: none; }

/* Column headers */
.header {
  background: #f8f9ff;
  flex-direction: column;
  height: 52px;
  gap: 2px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .05em;
  border-bottom: 2px solid var(--border);
}

.date {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0;
  text-transform: none;
}

.header.today-col {
  background: linear-gradient(160deg, #fffbeb 0%, #fef3c7 100%);
  border-bottom: 2px solid var(--amber);
}
.header.today-col .date { color: #92400e; }

.time {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text-muted);
  justify-content: flex-end;
  padding-right: 8px;
  background: #fafbff;
  border-right: 2px solid var(--border);
}

/* Empty bookable cell */
.cell.clickable:hover {
  background: #eef2ff;
  cursor: crosshair;
}
.cell.needs-login:hover {
  background: var(--amber-soft);
  cursor: pointer;
}

/* Past cells */
.past-cell {
  background: #f7f8fb;
}
.past-cell .time { background: #f4f5f9; }

/* Drag highlights */
.cell.drag-book   { background: #c7d7fe !important; cursor: crosshair; }
.cell.drag-delete { background: #fecaca !important; cursor: crosshair; }

/* Booking boxes */
.booking-box {
  position: absolute;
  inset: 2px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 500;
  overflow: hidden;
  padding: 0 4px;
  text-align: center;
  user-select: none;
  background: #dbeafe;
  color: #1d4ed8;
  border: 1px solid #bfdbfe;
}
.booking-box.mine {
  background: var(--green-soft);
  color: var(--green-dark);
  border: 1px solid #bbf7d0;
  cursor: pointer;
}
.booking-box.past {
  background: #f1f3f7;
  color: var(--text-muted);
  border: 1px solid var(--border);
}
.booking-box.admin-del {
  cursor: pointer;
  outline: 1.5px solid rgba(239,68,68,.5);
  outline-offset: -1px;
}

/* ═══════════════════════════════════════════
   SIDEBAR — USER AREA
═══════════════════════════════════════════ */
#user-badge {
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 9px;
  padding: 10px 12px;
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,.9);
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

#logout-btn {
  width: auto;
  padding: 4px 10px;
  font-size: 11px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 5px;
  color: rgba(255,255,255,.6);
  cursor: pointer;
  margin-bottom: 0;
  font-family: var(--sans);
  transition: all .15s;
}
#logout-btn:hover {
  background: rgba(239,68,68,.2);
  border-color: rgba(239,68,68,.4);
  color: #fca5a5;
}

#change-pw-link {
  display: inline-block;
  font-size: 12px;
  color: rgba(165,184,255,.7);
  cursor: pointer;
  margin-bottom: 0;
  padding: 4px 2px;
  background: none;
  border: none;
  text-align: left;
  width: auto;
  transition: color .15s;
}
#change-pw-link:hover { color: #a5b8ff; text-decoration: underline; background: none; }

#login-btn-sidebar {
  width: 100%;
  padding: 11px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  margin-bottom: 8px;
  font-family: var(--sans);
  transition: background .15s;
  box-shadow: 0 2px 8px rgba(74,108,247,.35);
}
#login-btn-sidebar:hover { background: var(--accent-dark); }

#readonly-notice {
  font-size: 12px;
  color: rgba(255,255,255,.3);
  line-height: 1.55;
  margin-bottom: 16px;
  padding: 0 2px;
}

/* ── Error banner ── */
#error-banner {
  display: none;
  background: rgba(239,68,68,.12);
  border: 1px solid rgba(239,68,68,.3);
  color: #fca5a5;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 14px;
}

/* ── Admin badge ── */
.badge-admin-inline {
  font-size: 9px;
  background: rgba(124,92,252,.25);
  color: #c4b5fd;
  border-radius: 4px;
  padding: 2px 6px;
  font-weight: 700;
  margin-left: 6px;
  letter-spacing: .06em;
  vertical-align: middle;
  border: 1px solid rgba(124,92,252,.3);
}

/* ═══════════════════════════════════════════
   MODALS
═══════════════════════════════════════════ */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,17,30,.55);
  backdrop-filter: blur(4px);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal.visible { display: flex; }

.modal-box {
  background: var(--white);
  border-radius: 16px;
  padding: 36px 40px;
  width: 360px;
  box-shadow: var(--shadow-lg);
  position: relative;
  box-sizing: border-box;
  border: 1px solid var(--border);
}
.modal-box h2 {
  margin: 0 0 24px;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.02em;
}
.modal-box input {
  width: 100%;
  padding: 10px 14px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: var(--sans);
  color: var(--text);
  background: var(--bg);
  box-sizing: border-box;
  transition: border-color .15s, box-shadow .15s;
  outline: none;
}
.modal-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(74,108,247,.12);
  background: var(--white);
}
.modal-box input.error-field { border-color: var(--red); }

.modal-submit {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 9px;
  font-size: 15px;
  font-weight: 600;
  font-family: var(--sans);
  cursor: pointer;
  margin-bottom: 0;
  text-align: center;
  transition: background .15s;
  box-shadow: 0 2px 8px rgba(74,108,247,.3);
}
.modal-submit:hover { background: var(--accent-dark); }
.modal-submit:disabled { background: #a0aef7; cursor: not-allowed; box-shadow: none; }

.modal-error   { color: var(--red);   font-size: 13px; margin-top: 10px; min-height: 18px; }
.modal-success { color: var(--green-dark); font-size: 13px; margin-top: 10px; min-height: 18px; }

.modal-close {
  position: absolute;
  top: 14px; right: 16px;
  background: none; border: none;
  font-size: 20px; color: var(--text-muted);
  cursor: pointer; width: auto;
  padding: 4px; margin: 0; line-height: 1;
  border-radius: 4px;
  transition: color .15s, background .15s;
}
.modal-close:hover { color: var(--text); background: var(--bg); }

/* ── Password strength ── */
#pw-strength-wrap { margin: -4px 0 14px; }
#pw-strength-bar-bg { height: 4px; background: var(--border); border-radius: 2px; }
#pw-strength-bar { height: 100%; border-radius: 2px; width: 0%; transition: width .2s, background .2s; }
#pw-strength-label { font-size: 11px; color: var(--text-muted); margin-top: 5px; }

/* ── Cal-message ── */
#cal-message {
  color: var(--text-muted);
  font-size: 14px;
  text-align: center;
  padding: 40px;
}
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <div class="app-logo">
    Lab Booking
    <span class="app-name">Instrument Reservation System</span>
  </div>
</div>

<!-- Login modal -->
<div id="login-modal" class="modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('login-modal')">✕</button>
    <h2>🔬 Lab Booking Login</h2>
    <input id="login-email"    type="email"    placeholder="Email address" />
    <input id="login-password" type="password" placeholder="Password"
           onkeydown="if(event.key==='Enter') doLogin()" />
    <button class="modal-submit" onclick="doLogin()">Sign In</button>
    <div class="modal-error" id="login-error"></div>
  </div>
</div>

<!-- Change password modal -->
<div id="pw-modal" class="modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('pw-modal')">✕</button>
    <h2>🔑 Change Password</h2>
    <input id="pw-current" type="password" placeholder="Current password" />
    <input id="pw-new"     type="password" placeholder="New password (min 8 characters)"
           oninput="updateStrength()" />
    <div id="pw-strength-wrap">
      <div id="pw-strength-bar-bg"><div id="pw-strength-bar"></div></div>
      <div id="pw-strength-label"></div>
    </div>
    <input id="pw-confirm" type="password" placeholder="Confirm new password"
           onkeydown="if(event.key==='Enter') doChangePassword()" />
    <button class="modal-submit" id="pw-submit" onclick="doChangePassword()">Update Password</button>
    <div class="modal-error"   id="pw-error"></div>
    <div class="modal-success" id="pw-success"></div>
  </div>
</div>

<aside>
  <h3>Researcher</h3>
  <div id="user-area"></div>
  <div id="error-banner"></div>
  <h3>Instruments</h3>
  <div id="instr"></div>
</aside>

<main>
  <!-- Instrument info bar: image left | description+notes+status | nav right -->
  <div id="instr-info-bar">
    <div id="instr-info-left">
      <img id="instr-image" src="" alt="">
      <div id="instr-info-text">
        <div id="instr-description"></div>
        <div id="instr-notes"></div>
        <div id="instr-status"></div>
      </div>
    </div>
    <div class="week-nav">
      <button onclick="changeWeek(-1)">← Previous</button>
      <button onclick="goToday()">Today</button>
      <button onclick="changeWeek(1)">Next →</button>
    </div>
  </div>

  <div id="calendar" class="calendar"></div>
  <div id="cal-message"></div>
</main>

<script>
const SUPABASE_URL = "https://mqpvnisphntdwhqoiqlt.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xcHZuaXNwaG50ZHdocW9pcWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzM5NjIsImV4cCI6MjA5MzE0OTk2Mn0.7eAeXAh0heqiaTLclqUzAeNY2gQDcbxNRe2LrLXvpHg";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const REST = SUPABASE_URL + "/rest/v1";
const HEADERS = {
  "apikey": SUPABASE_KEY,
  "Authorization": `Bearer ${SUPABASE_KEY}`,
  "Content-Type": "application/json"
};

let instruments=[], bookings=[], permissions=[];
let currentUser=null, currentUserID=null, currentUserEmail=null;
let currentUserIsAdmin=false;
let currentInstr=null, weekOffset=0;

// ═══════════════════════════════════════════
//  DRAG STATE
//  Unified click+drag: mousedown starts a drag of 1+ cells,
//  mouseup commits. A plain click is a drag of exactly one cell.
// ═══════════════════════════════════════════

let dragActive = false;
let dragMode   = null;   // 'book' | 'delete'
let dragSlots  = [];     // [{hour, date, booking, el}]
let dragKeys   = new Set();

function startDrag(mode, hour, date, booking, el) {
  dragActive = true;
  dragMode   = mode;
  dragSlots  = [];
  dragKeys.clear();
  tryAddDragSlot(hour, date, booking, el);
  document.body.style.userSelect = 'none';
}

function tryAddDragSlot(hour, date, booking, el) {
  const key = `${hour}|${date}`;
  if (dragKeys.has(key)) return;

  if (dragMode === 'book') {
    // Don't double-book
    const taken = bookings.find(x => x.instrument===currentInstr.id && x.hour===hour && x.date===date);
    if (taken) return;
    // Don't book in the past
    const slotTime = new Date(date + "T" + hour.toString().padStart(2,'0') + ":00");
    if (slotTime < new Date()) return;
    // Non-admins: respect advancedays
    if (!currentUserIsAdmin && currentInstr.advancedays != null) {
      const maxDate = new Date();
      maxDate.setDate(maxDate.getDate() + currentInstr.advancedays);
      if (slotTime > maxDate) return;
    }
  }

  if (dragMode === 'delete') {
    if (!booking) return;
    const mine = norm(booking.name) === norm(currentUser);
    if (!mine && !currentUserIsAdmin) return;
  }

  dragKeys.add(key);
  dragSlots.push({hour, date, booking, el});
  el.classList.add(dragMode === 'book' ? 'drag-book' : 'drag-delete');
}

async function endDrag() {
  if (!dragActive) return;
  dragActive = false;
  document.body.style.userSelect = '';

  // Remove highlights before async work
  dragSlots.forEach(s => s.el.classList.remove('drag-book', 'drag-delete'));

  const slots = [...dragSlots];
  dragSlots = []; dragKeys.clear();
  if (!slots.length) return;

  if (dragMode === 'book') {
    // Non-admins: check maxslot across the whole batch before committing
    if (!currentUserIsAdmin && currentInstr.maxslot != null) {
      const now = new Date();
      const existing = bookings.filter(b => {
        const t = new Date(b.date + "T" + b.hour.toString().padStart(2,'0') + ":00");
        return norm(b.name)===norm(currentUser) && b.instrument===currentInstr.id && t>=now;
      }).length;
      if (existing + slots.length > currentInstr.maxslot) {
        alert(`Booking limit reached — you can have at most ${currentInstr.maxslot} active bookings for this instrument.`);
        return;
      }
    }
    const base = Date.now();
    await Promise.all(slots.map(({hour, date}, idx) =>
      fetch(`${REST}/bookings`, {
        method: "POST", headers: HEADERS,
        body: JSON.stringify({
          id: `${base}${idx}`,
          instrument: currentInstr.id,
          date, hour,
          name: currentUser
        })
      })
    ));

  } else if (dragMode === 'delete') {
    await Promise.all(slots.map(({booking: b}) =>
      fetch(
        `${REST}/bookings?instrument=eq.${b.instrument}&hour=eq.${b.hour}&date=eq.${b.date}&name=eq.${encodeURIComponent(b.name)}`,
        { method: "DELETE", headers: HEADERS }
      )
    ));
  }

  bookings = await fetch(`${REST}/bookings?select=*`, {headers:HEADERS}).then(r=>r.json());
  renderCalendar();
}

// Commit drag on mouseup anywhere
document.addEventListener('mouseup', endDrag);

// ═══════════════════════════════════════════
//  MODALS
// ═══════════════════════════════════════════

function openModal(id){
  document.getElementById(id).classList.add("visible");
  if(id === "login-modal"){
    document.getElementById("login-error").textContent = "";
    document.getElementById("login-password").value = "";
    setTimeout(()=>document.getElementById("login-email").focus(), 50);
  }
  if(id === "pw-modal"){
    ["pw-current","pw-new","pw-confirm"].forEach(f=>{
      document.getElementById(f).value = "";
      document.getElementById(f).classList.remove("error-field");
    });
    document.getElementById("pw-error").textContent   = "";
    document.getElementById("pw-success").textContent = "";
    document.getElementById("pw-strength-bar").style.width = "0%";
    document.getElementById("pw-strength-label").textContent = "";
    setTimeout(()=>document.getElementById("pw-current").focus(), 50);
  }
}

function closeModal(id){
  document.getElementById(id).classList.remove("visible");
}

// ═══════════════════════════════════════════
//  PASSWORD STRENGTH
// ═══════════════════════════════════════════

function updateStrength(){
  const val  = document.getElementById("pw-new").value;
  const bar  = document.getElementById("pw-strength-bar");
  const lbl  = document.getElementById("pw-strength-label");
  let score = 0;
  if(val.length >= 8)           score++;
  if(val.length >= 12)          score++;
  if(/[A-Z]/.test(val))         score++;
  if(/[0-9]/.test(val))         score++;
  if(/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    { pct:"0%",   color:"#e0e0e0", label:"" },
    { pct:"20%",  color:"#e53935", label:"Very weak" },
    { pct:"40%",  color:"#fb8c00", label:"Weak" },
    { pct:"60%",  color:"#fdd835", label:"Fair" },
    { pct:"80%",  color:"#43a047", label:"Strong" },
    { pct:"100%", color:"#2e7d32", label:"Very strong" },
  ];
  const lvl = levels[Math.min(score, 5)];
  bar.style.width      = val.length ? lvl.pct : "0%";
  bar.style.background = lvl.color;
  lbl.textContent      = val.length ? lvl.label : "";
}

// ═══════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════

function showError(msg){
  const el = document.getElementById("error-banner");
  el.textContent   = msg;
  el.style.display = msg ? "block" : "none";
}

async function doLogin(){
  const email    = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  const errEl    = document.getElementById("login-error");
  errEl.textContent = "";

  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ errEl.textContent = error.message; return; }

  const res  = await fetch(`${REST}/users?id=eq.${data.user.id}&select=*`, { headers: HEADERS });
  const rows = await res.json();
  if(!rows.length){
    errEl.textContent = "No researcher account linked to this login.";
    await sb.auth.signOut();
    return;
  }

  currentUser        = rows[0].name;
  currentUserID      = rows[0].id;
  currentUserEmail   = data.user.email;
  currentUserIsAdmin = rows[0].admin || false;
  closeModal("login-modal");
  render();
}

async function doLogout(){
  await sb.auth.signOut();
  currentUser        = null;
  currentUserID      = null;
  currentUserEmail   = null;
  currentUserIsAdmin = false;
  currentInstr       = instruments[0] || null;
  render();
}

async function doChangePassword(){
  const current   = document.getElementById("pw-current").value;
  const newPw     = document.getElementById("pw-new").value;
  const confirm   = document.getElementById("pw-confirm").value;
  const errEl     = document.getElementById("pw-error");
  const okEl      = document.getElementById("pw-success");
  const submitBtn = document.getElementById("pw-submit");

  errEl.textContent = ""; okEl.textContent = "";
  ["pw-current","pw-new","pw-confirm"].forEach(f =>
    document.getElementById(f).classList.remove("error-field")
  );
  if(!current){
    errEl.textContent = "Please enter your current password.";
    document.getElementById("pw-current").classList.add("error-field"); return;
  }
  if(newPw.length < 8){
    errEl.textContent = "New password must be at least 8 characters.";
    document.getElementById("pw-new").classList.add("error-field"); return;
  }
  if(newPw !== confirm){
    errEl.textContent = "Passwords do not match.";
    document.getElementById("pw-confirm").classList.add("error-field"); return;
  }
  if(current === newPw){
    errEl.textContent = "New password must differ from your current password.";
    document.getElementById("pw-new").classList.add("error-field"); return;
  }
  submitBtn.disabled = true; submitBtn.textContent = "Updating…";

  const { error: authErr } = await sb.auth.signInWithPassword({
    email: currentUserEmail, password: current
  });
  if(authErr){
    errEl.textContent = "Current password is incorrect.";
    document.getElementById("pw-current").classList.add("error-field");
    submitBtn.disabled = false; submitBtn.textContent = "Update Password"; return;
  }
  const { error: updateErr } = await sb.auth.updateUser({ password: newPw });
  submitBtn.disabled = false; submitBtn.textContent = "Update Password";
  if(updateErr){ errEl.textContent = updateErr.message; return; }

  okEl.textContent = "✓ Password updated successfully.";
  ["pw-current","pw-new","pw-confirm"].forEach(f => document.getElementById(f).value = "");
  document.getElementById("pw-strength-bar").style.width   = "0%";
  document.getElementById("pw-strength-label").textContent = "";
  setTimeout(()=>closeModal("pw-modal"), 2000);
}

// ═══════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════

async function load(){
  showError("");
  try {
    const [i, b, p] = await Promise.all([
      fetch(`${REST}/instruments?select=*`, {headers:HEADERS}).then(r=>r.json()),
      fetch(`${REST}/bookings?select=*`,    {headers:HEADERS}).then(r=>r.json()),
      fetch(`${REST}/permissions?select=*`, {headers:HEADERS}).then(r=>r.json()),
    ]);
    if(i.code || b.code || p.code)
      throw new Error(i.message || b.message || p.message || "Database error");
    instruments  = i;
    bookings     = b;
    permissions  = p;
    currentInstr = instruments[0] || null;
  } catch(err){
    showError("Could not load data: " + err.message);
  }
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════

function render(){
  renderUserArea();
  renderInstr();
  renderInstrInfo();
  renderCalendar();
}

function renderUserArea(){
  const el = document.getElementById("user-area");
  if(currentUser){
    const badge = currentUserIsAdmin
      ? '<span class="badge-admin-inline">ADMIN</span>'
      : '';
    el.innerHTML = `
      <div id="user-badge">
        <span>${currentUser}${badge}</span>
        <button id="logout-btn" onclick="doLogout()">Logout</button>
      </div>
      <button id="change-pw-link" onclick="openModal('pw-modal')">🔑 Change password</button>`;
  } else {
    el.innerHTML = `
      <button id="login-btn-sidebar" onclick="openModal('login-modal')">Login</button>
      <p id="readonly-notice">Browse the calendar without logging in, or log in to make and edit bookings.</p>`;
  }
}

function renderInstr(){
  const el = document.getElementById("instr");

  // Logged-out or admin → all instruments; regular user → permitted only
  const visible = (!currentUser || currentUserIsAdmin
    ? instruments
    : instruments.filter(i => permissions.some(p => p.user_id===currentUserID && p.instrument_id===i.id))
  ).slice().sort((a, b) => {
    const aHas = a.sortorder != null;
    const bHas = b.sortorder != null;
    if(aHas && bHas) return a.sortorder - b.sortorder;
    if(aHas) return -1;
    if(bHas) return  1;
    return a.name.localeCompare(b.name);
  });

  if(!visible.find(i => currentInstr && i.id===currentInstr.id))
    currentInstr = visible[0] || null;

  el.innerHTML = visible.length
    ? visible.map(i =>
        `<button class="${currentInstr && i.id===currentInstr.id ? 'active' : ''}"
                 onclick="selectInstr('${i.id}')">${i.name}</button>`
      ).join("")
    : `<p style="font-size:13px;color:rgba(255,255,255,.3)">No instruments available.</p>`;
}

function selectInstr(id){ currentInstr = instruments.find(i=>i.id===id); render(); }

function renderInstrInfo(){
  const img      = document.getElementById("instr-image");
  const descEl   = document.getElementById("instr-description");
  const notesEl  = document.getElementById("instr-notes");
  const statusEl = document.getElementById("instr-status");

  if(currentInstr){
    img.src = currentInstr.id + ".png";
    img.style.display = "block";
    img.onerror = () => { img.style.display = "none"; };
    descEl.textContent  = currentInstr.description || "";
    notesEl.textContent = currentInstr.notes        || "";
    const op = currentInstr.operational !== false;
    statusEl.innerHTML  = op
      ? `<span class="status-ok">● Operational</span>`
      : `<span class="status-off">⚠ Offline / Unavailable</span>`;
  } else {
    img.style.display    = "none";
    descEl.textContent   = "";
    notesEl.textContent  = "";
    statusEl.textContent = "";
  }
}

function norm(s){ return (s||"").trim().toLowerCase(); }
function goToday(){ weekOffset=0; renderCalendar(); }
function changeWeek(delta){ weekOffset+=delta; renderCalendar(); }

function weekDates(){
  const today=new Date();
  const diff=(today.getDay()===0?-6:1-today.getDay());
  const monday=new Date(today);
  monday.setDate(today.getDate()+diff+weekOffset*7);
  return Array.from({length:7},(_,i)=>{
    const d=new Date(monday); d.setDate(monday.getDate()+i); return d;
  });
}

function renderCalendar(){
  const cal=document.getElementById("calendar");
  const msg=document.getElementById("cal-message");
  cal.innerHTML=""; msg.textContent="";

  if(!currentInstr){
    msg.textContent = instruments.length
      ? "Select an instrument to view the calendar."
      : "No instruments loaded — check your connection.";
    return;
  }

  const days=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  const dates=weekDates();
  const now=new Date();
  const todayStr=now.toISOString().split("T")[0];

  // Column headers
  cal.appendChild(document.createElement("div"));
  days.forEach((d,i)=>{
    const h=document.createElement("div");
    const dateStr=dates[i].toISOString().split("T")[0];
    h.className="cell header"+(dateStr===todayStr?" today-col":"");
    h.innerHTML=`${d}<div class="date">${dateStr}</div>`;
    cal.appendChild(h);
  });

  // Hour rows
  for(let h=0;h<24;h++){
    const t=document.createElement("div");
    t.className="cell time";
    t.textContent=h.toString().padStart(2,'0')+":00";
    cal.appendChild(t);

    for(let i=0;i<7;i++){
      const dateStr=dates[i].toISOString().split("T")[0];
      const c=document.createElement("div");
      const slotTime=new Date(dateStr+"T"+h.toString().padStart(2,'0')+":00");
      const isPast=slotTime<now;
      c.className="cell"+(isPast?" past-cell":"");

      const b=bookings.find(x=>x.instrument===currentInstr.id&&x.hour===h&&x.date===dateStr);

      if(b){
        // ── Booked cell ──
        const mine      = currentUser && norm(b.name)===norm(currentUser);
        const canDelete = !isPast && (mine || currentUserIsAdmin);
        const boxCls    = ["booking-box", mine?"mine":"", isPast?"past":"", canDelete&&!mine?"admin-del":""]
                          .filter(Boolean).join(" ");
        c.innerHTML = `<div class="${boxCls}">${b.name}</div>`;

        if(canDelete){
          c.addEventListener('mousedown', e=>{
            e.preventDefault();
            startDrag('delete', h, dateStr, b, c);
          });
          c.addEventListener('mouseover', ()=>{
            if(dragActive && dragMode==='delete') tryAddDragSlot(h, dateStr, b, c);
          });
        }

      } else if(!isPast){
        // ── Empty future cell ──
        if(currentUser){
          // Admins bypass advancedays; regular users respect it
          const withinWindow = currentUserIsAdmin
            || currentInstr.advancedays == null
            || slotTime <= new Date(new Date().setDate(now.getDate()+currentInstr.advancedays));

          if(withinWindow){
            c.classList.add("clickable");
            c.addEventListener('mousedown', e=>{
              e.preventDefault();
              startDrag('book', h, dateStr, null, c);
            });
            c.addEventListener('mouseover', ()=>{
              if(dragActive && dragMode==='book') tryAddDragSlot(h, dateStr, null, c);
            });
          }
        } else {
          c.classList.add("needs-login");
          c.onclick=()=>openModal("login-modal");
        }
      }

      cal.appendChild(c);
    }
  }
}

// ═══════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════

(async()=>{
  renderUserArea();
  const [, sessionResult] = await Promise.all([load(), sb.auth.getSession()]);
  const session = sessionResult?.data?.session;
  if(session?.user){
    const res  = await fetch(`${REST}/users?id=eq.${session.user.id}&select=*`, { headers: HEADERS });
    const rows = await res.json();
    if(rows.length){
      currentUser        = rows[0].name;
      currentUserID      = rows[0].id;
      currentUserEmail   = session.user.email;
      currentUserIsAdmin = rows[0].admin || false;
    }
  }
  render();
})();
</script>
