<script>
const MAX_DURATION = 4;

// helper (already present)
function norm(s){ return (s || "").trim().toLowerCase(); }

async function book(hour,date){

  const duration = parseInt(prompt("Booking duration (hours 1–4):", "1"));

  if(!duration || duration < 1 || duration > MAX_DURATION) return;

  const newRows = [];

  for(let i=0;i<duration;i++){

    const h = hour + i;

    if(h >= 20){
      alert("Cannot exceed working hours");
      return;
    }

    // prevent overlap
    const exists = bookings.find(b =>
      b.instrument === currentInstr.id &&
      b.date === date &&
      b.hour === h
    );

    if(exists){
      alert("Slot already booked");
      return;
    }

    newRows.push({
      id: Date.now().toString() + "_" + i,
      instrument: currentInstr.id,
      date: date,
      hour: h,
      name: currentUser,
      note:""
    });
  }

  for(const row of newRows){
    await fetch(`${URL}/bookings`,{
      method:"POST",
      headers:HEADERS,
      body:JSON.stringify(row)
    });
  }

  bookings = await fetch(`${URL}/bookings?select=*`, {headers:HEADERS}).then(r=>r.json());
  renderCalendar();
}
</script>
