<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lab Booking</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  display:grid;
  grid-template-columns:260px 1fr;
  height:100vh;
  background:#f7f6f2;
  color:#1a1917;
}

/* Sidebar */
aside {
  background:#ffffff;
  border-right:1px solid #e3e1d9;
  padding:24px 20px;
}

h3 {
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:#7a7870;
  margin-bottom:8px;
}

/* Dropdown */
select {
  width:100%;
  padding:8px 10px;
  margin-bottom:20px;
  border:1px solid #ddd;
  border-radius:6px;
  background:#fafafa;
  font-size:13px;
}

/* Instruments */
button {
  width:100%;
  padding:8px 10px;
  margin-bottom:4px;
  border:none;
  background:none;
  text-align:left;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  transition: background 0.15s;
}

button:hover {
  background:#f0efea;
}

button.active {
  background:#e8f0ea;
  color:#2d5a3d;
  font-weight:500;
}

/* Main */
main {
  padding:24px;
}

#title {
  font-size:18px;
  font-weight:500;
}

#desc {
  font-size:13px;
  color:#6e6c65;
  margin-bottom:18px;
}

/* Calendar */
.calendar {
  display:grid;
  grid-template-columns:60px repeat(5,1fr);
  border:1px solid #e3e1d9;
  border-radius:10px;
  overflow:hidden;
  background:#ffffff;
}

.cell {
  border-bottom:1px solid #e3e1d9;
  border-right:1px solid #e3e1d9;
  height:44px;
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.header {
  background:#f7f6f2;
  font-weight:500;
}

.time {
  font-size:11px;
  color:#7a7870;
  justify-content:flex-end;
  padding-right:8px;
  background:#faf9f6;
}

/* Hover */
.cell.clickable:hover {
  background:#eef3ef;
  cursor:pointer;
}

/* Booking */
.booking {
  background:#cfe3f5;
  color:#1a4a7a;
  font-weight:500;
  border-radius:6px;
  margin:2px;
  padding:2px 6px;
}
</style>
</head>

<body>

<aside>
  <h3>Researcher</h3>
  <select id="user"></select>

  <h3>Instruments</h3>
  <div id="instr"></div>
</aside>

<main>
  <h2 id="title"></h2>
  <div id="desc"></div>
  <div id="calendar" class="calendar"></div>
</main>

<script>
const URL = "https://mqpvnisphntdwhqoiqlt.supabase.co/rest/v1";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xcHZuaXNwaG50ZHdocW9pcWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzM5NjIsImV4cCI6MjA5MzE0OTk2Mn0.7eAeXAh0heqiaTLclqUzAeNY2gQDcbxNRe2LrLXvpHg";

const HEADERS = {
  "apikey": KEY,
  "Authorization": `Bearer ${KEY}`,
  "Content-Type": "application/json"
};

let users = [];
let instruments = [];
let bookings = [];

let currentUser = null;
let currentInstr = null;

function weekDates(){
  const today = new Date();
  const monday = new Date(today);
  const diff = (today.getDay()===0?-6:1-today.getDay());
  monday.setDate(today.getDate()+diff);

  return Array.from({length:5},(_,i)=>{
    const d=new Date(monday);
    d.setDate(monday.getDate()+i);
    return d.toISOString().split("T")[0];
  });
}

async function load(){
  users = await fetch(`${URL}/users?select=*`, {headers:HEADERS}).then(r=>r.json());
  instruments = await fetch(`${URL}/instruments?select=*`, {headers:HEADERS}).then(r=>r.json());
  bookings = await fetch(`${URL}/bookings?select=*`, {headers:HEADERS}).then(r=>r.json());

  currentUser = users[0]?.name;
  currentInstr = instruments[0];

  render();
}

function render(){
  renderUsers();
  renderInstr();
  renderMain();
  renderCalendar();
}

function renderUsers(){
  const el = document.getElementById("user");
  el.innerHTML = users.map(u=>`<option>${u.name}</option>`).join("");
  el.onchange = e=>currentUser=e.target.value;
}

function renderInstr(){
  const el = document.getElementById("instr");
  el.innerHTML = instruments.map(i =>
    `<button class="${i.id===currentInstr.id?'active':''}" onclick="selectInstr('${i.id}')">${i.name}</button>`
  ).join("");
}

function selectInstr(id){
  currentInstr = instruments.find(i=>i.id===id);
  render();
}

function renderMain(){
  document.getElementById("title").textContent = currentInstr.name;
  document.getElementById("desc").textContent = currentInstr.description;
}

function renderCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML="";

  const days=["Mon","Tue","Wed","Thu","Fri"];
  const dates=weekDates();

  cal.appendChild(document.createElement("div"));
  days.forEach(d=>{
    const h=document.createElement("div");
    h.className="cell header";
    h.textContent=d;
    cal.appendChild(h);
  });

  for(let h=8;h<20;h++){
    const t=document.createElement("div");
    t.className="cell time";
    t.textContent=h+":00";
    cal.appendChild(t);

    for(let i=0;i<5;i++){
      const date=dates[i];
      const c=document.createElement("div");
      c.className="cell";

      const b = bookings.find(x =>
        x.instrument===currentInstr.id &&
        x.hour===h &&
        x.date===date
      );

      if(b){
        c.classList.add("booking");
        c.textContent=b.name;
      } else {
        c.classList.add("clickable");
        c.onclick=()=>book(h,date);
      }

      cal.appendChild(c);
    }
  }
}

async function book(hour,date){
  const row={
    id: Date.now().toString(),
    instrument: currentInstr.id,
    date: date,
    hour: hour,
    name: currentUser,
    note:""
  };

  await fetch(`${URL}/bookings`,{
    method:"POST",
    headers:HEADERS,
    body:JSON.stringify(row)
  });

  bookings = await fetch(`${URL}/bookings?select=*`, {headers:HEADERS}).then(r=>r.json());
  renderCalendar();
}

load();
</script>

</body>
</html>
