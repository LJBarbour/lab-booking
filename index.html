<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lab Booking</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { margin:0; font-family: system-ui, -apple-system, sans-serif; display:grid; grid-template-columns:260px 1fr; height:100vh; background:#f6f7fb; }
aside { background:#ffffff; border-right:1px solid #e6e8ef; padding:24px; }

h3 { font-size:11px; text-transform:uppercase; color:#8a8f9c; margin-bottom:10px; }

select { width:100%; padding:10px; margin-bottom:20px; }

button {
  width:100%;
  padding:10px;
  margin-bottom:6px;
  border:none;
  background:none;
  text-align:left;
  cursor:pointer;
}

button:hover { background:#f0f3ff; }

button.active {
  background:#dbe7ff;
  font-weight:600;
  border-left:4px solid #4a6cf7;
  padding-left:6px;
  border-radius:4px;
}

#auth {
  margin-bottom:20px;
}

main { padding:24px; }

.calendar {
  display:grid;
  grid-template-columns:60px repeat(7,1fr);
  border:1px solid #e6e8ef;
  border-radius:12px;
  overflow:hidden;
  background:#fff;
}

.cell {
  border:1px solid #e6e8ef;
  height:26px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.header {
  background:#fafbff;
  height:50px;
}

</style>
</head>

<body>

<aside>

  <div id="auth">
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
    <div id="user-email"></div>
  </div>

  <h3>Researcher</h3>
  <select id="user"></select>

  <h3>Instruments</h3>
  <div id="instr"></div>

</aside>

<main>

  <h2 id="title"></h2>
  <div id="calendar" class="calendar"></div>

</main>

<script>

console.log("VERSION: 1.2.0");

/* SUPABASE SETUP */
const supabase = window.supabase.createClient(
  "https://mqpvnisphntdwhqoiqlt.supabase.co",
  "YOUR_ANON_KEY_HERE"
);

/* AUTH FUNCTIONS */
async function login(){
  const email = prompt("Enter email:");
  const { error } = await supabase.auth.signInWithOtp({ email });
  if(error) alert(error.message);
  else alert("Check your email for login link");
}

async function logout(){
  await supabase.auth.signOut();
  document.getElementById("user-email").textContent = "";
}

/* SHOW USER */
async function getUser(){
  const { data } = await supabase.auth.getUser();
  if(data.user){
    document.getElementById("user-email").textContent = data.user.email;
  }
}

/* LOAD ON START */
getUser();

</script>

</body>
</html>
