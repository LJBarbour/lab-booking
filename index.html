<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Supabase Test</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<button id="loginBtn">Login</button>
<div id="status">Not logged in</div>

<script>

console.log("VERSION: 1.2.4");

// ✅ Hard-coded + trimmed to remove hidden characters
const URL = ("https://mqpvnisphntdwhqoiqlt.supabase.co").trim();

// 🔴 REPLACE THIS WITH YOUR REAL KEY
const KEY = "YOUR_ANON_KEY_HERE";

let sb = null;

window.addEventListener("load", async () => {

  console.log("URL being used:", URL);

  try {
    sb = window.supabase.createClient(URL, KEY);
    console.log("Supabase initialized OK");

  } catch (err) {
    console.error("INIT FAILED:", err);
  }

});

document.getElementById("loginBtn").onclick = async () => {

  if (!sb) {
    alert("Supabase failed to initialize");
    return;
  }

  const email = prompt("Email:");
  const password = prompt("Password:");

  const { data, error } = await sb.auth.signInWithPassword({
    email, password
  });

  console.log(data, error);

  if (data?.user) {
    document.getElementById("status").textContent = data.user.email;
  }

};

</script>

</body>
</html>
