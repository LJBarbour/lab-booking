<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lab Booking</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { margin:0; font-family: system-ui, -apple-system, sans-serif; display:grid; grid-template-columns:260px 1fr; height:100vh; background:#f6f7fb; }
aside { background:#ffffff; border-right:1px solid #e6e8ef; padding:24px; }
h3 { font-size:11px; text-transform:uppercase; color:#8a8f9c; margin-bottom:10px; }
select { width:100%; padding:10px; margin-bottom:20px; }

button {
  width:100%;
  padding:10px;
  margin-bottom:6px;
  border:none;
  background:none;
  text-align:left;
  cursor:pointer;
}

button:hover { background:#f0f3ff; }

button.active {
  background:#dbe7ff;
  font-weight:600;
  border-left:4px solid #4a6cf7;
  padding-left:6px;
  border-radius:4px;
}

main { padding:24px; }

.calendar {
  display:grid;
  grid-template-columns:60px repeat(7,1fr);
  border:1px solid #e6e8ef;
  border-radius:12px;
  overflow:hidden;
  background:#fff;
}

.cell {
  border:1px solid #e6e8ef;
  height:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.header {
  background:#fafbff;
  flex-direction:column;
  height:50px;
}

.date {
  font-size:14px;
  font-weight:600;
  color:#444;
}

.header.today-col {
  background:#ffe082;
}

.time { font-size:11px; color:#9aa0ad; justify-content:flex-end; padding-right:8px; }

.cell.clickable:hover {
  background:#eef2ff;
  cursor:pointer;
}

.booking-box {
  position:absolute;
  inset:1px;
  background:#dbe7ff;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.booking-box.mine {
  background:#d7f5e3;
  cursor:pointer;
}

.booking-box.past {
  background:#e0e0e0;
  color:#888;
}

.past-cell {
  background:#f0f0f0;
  color:#999;
}

#auth { margin-bottom:20px; font-size:12px; }
</style>
</head>

<body>

<aside>

<div id="auth">
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
  <div id="user-email">Not logged in</div>
</div>

<h3>Researcher</h3>
<select id="user"></select>

<h3>Instruments</h3>
<div id="instr"></div>

</aside>

<main>
  <h2 id="title"></h2>

  <div class="week-nav">
    <button onclick="changeWeek(-1)">← Previous</button>
    <button onclick="goToday()">Today</button>
    <button onclick="changeWeek(1)">Next →</button>
  </div>

  <div id="calendar" class="calendar"></div>
</main>

<script>

console.log("VERSION: 1.4.4");

const SUPABASE_URL = "https://mqpvnisphntdwhqoiqlt.supabase.co";
const REST = SUPABASE_URL + "/rest/v1";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xcHZuaXNwaG50ZHdocW9pcWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzM5NjIsImV4cCI6MjA5MzE0OTk2Mn0.7eAeXAh0heqiaTLclqUzAeNY2gQDcbxNRe2LrLXvpHg";

const HEADERS = {
  "apikey": KEY,
  "Authorization": `Bearer ${KEY}`,
  "Content-Type": "application/json"
};

const sb = window.supabase.createClient(SUPABASE_URL, KEY);

let users=[], instruments=[], bookings=[], permissions=[];
let currentUser=null, currentInstr=null;
let weekOffset = 0;
let loggedIn = false;

function norm(s){ return (s || "").trim().toLowerCase(); }

function goToday(){ weekOffset = 0; renderCalendar(); }
function changeWeek(delta){ weekOffset += delta; renderCalendar(); }

function weekDates(){
  const today = new Date();
  const monday = new Date(today);
  const diff = (today.getDay()===0?-6:1-today.getDay());
  monday.setDate(today.getDate()+diff + weekOffset*7);

  return Array.from({length:7},(_,i)=>{
    const d=new Date(monday);
    d.setDate(monday.getDate()+i);
    return d;
  });
}

async function load(){
  users = await fetch(`${REST}/users?select=*`, {headers:HEADERS}).then(r=>r.json());
  instruments = await fetch(`${REST}/instruments?select=*`, {headers:HEADERS}).then(r=>r.json());
  bookings = await fetch(`${REST}/bookings?select=*`, {headers:HEADERS}).then(r=>r.json());
  permissions = await fetch(`${REST}/permissions?select=*`, {headers:HEADERS}).then(r=>r.json());

  currentUser = users[0]?.name;
  currentInstr = instruments[0];

  render();
}

function render(){
  renderUsers();
  renderInstr();
  renderTitle();
  renderCalendar();
}

// 🔒 ONLY CHANGE: disable dropdown when logged in
function renderUsers(){
  const el = document.getElementById("user");
  el.innerHTML = users.map(u =>
    `<option value="${u.name}" ${u.name===currentUser?"selected":""}>${u.name}</option>`
  ).join("");

  el.disabled = loggedIn;

  el.onchange = e => {
    if(!loggedIn){
      currentUser = e.target.value;
      render();
    }
  };
}

function renderInstr(){
  const el = document.getElementById("instr");

  const allowed = instruments.filter(i =>
    permissions.some(p =>
      p.user_id === currentUser &&
      p.instrument_id === i.id
    )
  );

  if (!allowed.find(i => currentInstr && i.id === currentInstr.id)) {
    currentInstr = allowed[0] || null;
  }

  el.innerHTML = allowed.map(i =>
    `<button class="${currentInstr && i.id===currentInstr.id ? 'active' : ''}" onclick="selectInstr('${i.id}')">${i.name}</button>`
  ).join("");
}

function selectInstr(id){
  currentInstr = instruments.find(i=>i.id===id);
  render();
}

function renderTitle(){
  document.getElementById("title").textContent = currentInstr?.description || "";
}

function renderCalendar(){

  const cal = document.getElementById("calendar");
  cal.innerHTML="";

  const days=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  const dates=weekDates();
  const now = new Date();

  cal.appendChild(document.createElement("div"));

  days.forEach((d,i)=>{
    const h=document.createElement("div");
    const dateStr = dates[i].toISOString().split("T")[0];
    h.className="cell header";
    h.innerHTML = `${d}<div class="date">${dateStr}</div>`;
    cal.appendChild(h);
  });

  for(let h=0;h<24;h++){
    const t=document.createElement("div");
    t.className="cell time";
    t.textContent=h.toString().padStart(2,'0')+":00";
    cal.appendChild(t);

    for(let i=0;i<7;i++){
      const dateStr = dates[i].toISOString().split("T")[0];
      const c=document.createElement("div");

      const slotTime = new Date(dateStr + "T" + h.toString().padStart(2,'0') + ":00");
      const isPast = slotTime < now;

      const b = bookings.find(x =>
        x.instrument===currentInstr.id &&
        x.hour===h &&
        x.date===dateStr
      );

      if(b){
        const mine = norm(b.name) === norm(currentUser);
        c.innerHTML = `<div class="booking-box ${mine ? 'mine' : ''}">${b.name}</div>`;

        if(mine && !isPast){
          c.onclick = () => deleteBooking(b);
        }

      } else if(!isPast){
        c.classList.add("clickable");
        c.onclick = () => book(h, dateStr);
      }

      cal.appendChild(c);
    }
  }
}

// 🔐 AUTH ONLY SETS currentUser — NOTHING ELSE
async function login(){
  const email = prompt("Email:");
  const password = prompt("Password:");

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if(error){
    alert(error.message);
    return;
  }

  document.getElementById("user-email").textContent = email;

  const res = await fetch(`${REST}/users?auth_id=eq.${data.user.id}`, {headers:HEADERS});
  const row = await res.json();

  if(!row.length){
    alert("No matching user record");
    return;
  }

  currentUser = row[0].name;
  loggedIn = true;

  render();
}

async function logout(){
  await sb.auth.signOut();
  loggedIn = false;
  currentUser = users[0]?.name;
  document.getElementById("user-email").textContent = "Not logged in";
  render();
}

async function deleteBooking(b){
  await fetch(`${REST}/bookings?id=eq.${b.id}`,{
    method:"DELETE",
    headers:HEADERS
  });

  bookings = await fetch(`${REST}/bookings?select=*`, {headers:HEADERS}).then(r=>r.json());
  renderCalendar();
}

async function book(hour,date){

  await fetch(`${REST}/bookings`,{
    method:"POST",
    headers:HEADERS,
    body:JSON.stringify({
      id: Date.now().toString(),
      instrument: currentInstr.id,
      date,
      hour,
      name: currentUser
    })
  });

  bookings = await fetch(`${REST}/bookings?select=*`, {headers:HEADERS}).then(r=>r.json());
  renderCalendar();
}

load();

</script>
</body>
</html>
