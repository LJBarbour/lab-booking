<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lab Booking</title>

<style>
body {
  margin:0;
  font-family: system-ui, -apple-system, sans-serif;
  display:grid;
  grid-template-columns:260px 1fr;
  height:100vh;
  background:#f7f6f2;
}

aside {
  background:#ffffff;
  border-right:1px solid #e3e1d9;
  padding:24px 20px;
}

h3 {
  font-size:11px;
  text-transform:uppercase;
  color:#7a7870;
  margin-bottom:8px;
}

select {
  width:100%;
  padding:8px;
  margin-bottom:20px;
}

button {
  width:100%;
  padding:8px;
  margin-bottom:4px;
  border:none;
  background:none;
  text-align:left;
  border-radius:6px;
  cursor:pointer;
}

button:hover { background:#f0efea; }

button.active {
  background:#e8f0ea;
  font-weight:bold;
}

/* Admin */
.admin-box {
  margin-top:20px;
  padding:10px;
  border:1px solid #ddd;
  border-radius:6px;
  background:#fafafa;
}

.admin-banner {
  margin-top:10px;
  padding:6px;
  font-size:11px;
  background:#ffe0e0;
  color:#8b2020;
  border-radius:6px;
  display:none;
}

.admin-active { display:block; }

/* Main */
main { padding:24px; }

/* Calendar */
.calendar {
  display:grid;
  grid-template-columns:60px repeat(5,1fr);
  border:1px solid #ddd;
  border-radius:10px;
  overflow:hidden;
  background:white;
}

.cell {
  border:1px solid #eee;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
}

.header { background:#f7f6f2; }
.time { font-size:11px; color:#777; justify-content:flex-end; padding-right:8px; }

.cell.clickable:hover {
  background:#eef3ef;
  cursor:pointer;
}

.booking {
  background:#cfe3f5;
  border-radius:6px;
  padding:2px 6px;
}

.booking.mine { background:#d4f5d8; }
.booking.admin { background:#ffd6d6; }
</style>
</head>

<body>

<aside>
  <h3>Researcher</h3>
  <select id="user"></select>

  <h3>Instruments</h3>
  <div id="instr"></div>

  <div class="admin-box">
    <label>
      <input type="checkbox" id="adminToggle"> Admin mode
    </label>
    <div id="admin-banner" class="admin-banner">ADMIN ACTIVE</div>
  </div>
</aside>

<main>
  <h2 id="title"></h2>
  <div id="desc"></div>
  <div id="calendar" class="calendar"></div>
</main>

<script>
const URL = "https://mqpvnisphntdwhqoiqlt.supabase.co/rest/v1";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xcHZuaXNwaG50ZHdocW9pcWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzM5NjIsImV4cCI6MjA5MzE0OTk2Mn0.7eAeXAh0heqiaTLclqUzAeNY2gQDcbxNRe2LrLXvpHg";

const HEADERS = {
  "apikey": KEY,
  "Authorization": `Bearer ${KEY}`,
  "Content-Type": "application/json"
};

let users=[], instruments=[], bookings=[];
let currentUser=null, currentInstr=null;
let adminMode=false;

document.getElementById("adminToggle").onchange = e => {
  adminMode = e.target.checked;
  document.getElementById("admin-banner")
    .classList.toggle("admin-active", adminMode);
  renderCalendar();
};

function weekDates(){
  const today = new Date();
  const monday = new Date(today);
  const diff = (today.getDay()===0?-6:1-today.getDay());
  monday.setDate(today.getDate()+diff);

  return Array.from({length:5},(_,i)=>{
    const d=new Date(monday);
    d.setDate(monday.getDate()+i);
    return d.toISOString().split("T")[0];
  });
}

async function load(){
  users = await fetch(`${URL}/users?select=*`, {headers:HEADERS}).then(r=>r.json());
  instruments = await fetch(`${URL}/instruments?select=*`, {headers:HEADERS}).then(r=>r.json());
  bookings = await fetch(`${URL}/bookings?select=*`, {headers:HEADERS}).then(r=>r.json());

  currentUser = users[0]?.name;
  currentInstr = instruments[0];

  render();
}

function render(){
  renderUsers();
  renderInstr();
  renderMain();
  renderCalendar();
}

function renderUsers(){
  const el = document.getElementById("user");
  el.innerHTML = users.map(u=>`<option>${u.name}</option>`).join("");
  el.onchange = e=>currentUser=e.target.value;
}

function renderInstr(){
  const el = document.getElementById("instr");
  el.innerHTML = instruments.map(i =>
    `<button class="${i.id===currentInstr.id?'active':''}" onclick="selectInstr('${i.id}')">${i.name}</button>`
  ).join("");
}

function selectInstr(id){
  currentInstr = instruments.find(i=>i.id===id);
  render();
}

function renderMain(){
  document.getElementById("title").textContent = currentInstr.name;
  document.getElementById("desc").textContent = currentInstr.description;
}

function renderCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML="";

  const days=["Mon","Tue","Wed","Thu","Fri"];
  const dates=weekDates();

  cal.appendChild(document.createElement("div"));
  days.forEach(d=>{
    const h=document.createElement("div");
    h.className="cell header";
    h.textContent=d;
    cal.appendChild(h);
  });

  for(let h=8;h<20;h++){
    const t=document.createElement("div");
    t.className="cell time";
    t.textContent=h+":00";
    cal.appendChild(t);

    for(let i=0;i<5;i++){
      const date=dates[i];
      const c=document.createElement("div");
      c.className="cell";

      const b = bookings.find(x =>
        x.instrument===currentInstr.id &&
        x.hour===h &&
        x.date===date
      );

      if(b){
        c.classList.add("booking");

        if(b.name===currentUser) c.classList.add("mine");
        if(adminMode) c.classList.add("admin");

        c.textContent=b.name;

        if(b.name===currentUser || adminMode){
          c.onclick = () => deleteBooking(b);
        }

      } else {
        c.classList.add("clickable");
        c.onclick=()=>book(h,date);
      }

      cal.appendChild(c);
    }
  }
}

async function book(hour,date){
  const row={
    id: Date.now().toString(),
    instrument: currentInstr.id,
    date: date,
    hour: hour,
    name: currentUser,
    note:""
  };

  await fetch(`${URL}/bookings`,{
    method:"POST",
    headers:HEADERS,
    body:JSON.stringify(row)
  });

  bookings = await fetch(`${URL}/bookings?select=*`, {headers:HEADERS}).then(r=>r.json());
  renderCalendar();
}

async function deleteBooking(b){
  if(!confirm("Delete this booking?")) return;

  await fetch(
    `${URL}/bookings?instrument=eq.${b.instrument}&hour=eq.${b.hour}&date=eq.${b.date}&name=eq.${b.name}`,
    {
      method:"DELETE",
      headers:HEADERS
    }
  );

  bookings = await fetch(`${URL}/bookings?select=*`, {headers:HEADERS}).then(r=>r.json());
  renderCalendar();
}

load();
</script>

</body>
</html>
