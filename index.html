<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lab Booking</title>

<style>
body { margin:0; font-family:Arial; display:grid; grid-template-columns:260px 1fr; height:100vh; }
aside { background:#fff; border-right:1px solid #ddd; padding:20px; }
main { padding:20px; }
.calendar { display:grid; grid-template-columns:60px repeat(5,1fr); }
.cell { border:1px solid #eee; height:40px; }
.header { font-weight:bold; text-align:center; }
.time { text-align:right; }
</style>
</head>

<body>

<aside>
  <h3>Researcher</h3>
  <select id="user"></select>

  <h3>Instruments</h3>
  <div id="instr"></div>
</aside>

<main>
  <h2 id="title"></h2>
  <div id="desc"></div>
  <div id="calendar" class="calendar"></div>
  <pre id="debug"></pre>
</main>

<script>
const URL = "https://mqpvnisphntdwhqoiqlt.supabase.co/rest/v1";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xcHZuaXNwaG50ZHdocW9pcWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzM5NjIsImV4cCI6MjA5MzE0OTk2Mn0.7eAeXAh0heqiaTLclqUzAeNY2gQDcbxNRe2LrLXvpHg";

let users=[], instruments=[], bookings=[];
let currentUser=null, currentInstr=null;

function log(msg){
  document.getElementById("debug").textContent += msg + "\n";
}

async function load(){
  try {
    log("Loading users...");
    users = await fetch(`${URL}/users?select=*&apikey=${KEY}`).then(r=>r.json());

    log("Loading instruments...");
    instruments = await fetch(`${URL}/instruments?select=*&apikey=${KEY}`).then(r=>r.json());

    log("Loading bookings...");
    bookings = await fetch(`${URL}/bookings?select=*&apikey=${KEY}`).then(r=>r.json());

    log("Users: " + users.length);
    log("Instruments: " + instruments.length);

    if (!users.length || !instruments.length){
      log("Missing data");
      return;
    }

    currentUser = users[0].name;
    currentInstr = instruments[0];

    render();

  } catch(e){
    log("ERROR: " + e.message);
    console.error(e);
  }
}

function render(){
  renderUsers();
  renderInstr();
  renderMain();
  renderCalendar();
}

function renderUsers(){
  const el = document.getElementById("user");
  el.innerHTML = users.map(u => `<option>${u.name}</option>`).join("");
  el.onchange = e => currentUser = e.target.value;
}

function renderInstr(){
  const el = document.getElementById("instr");
  el.innerHTML = instruments.map(i =>
    `<button onclick="selectInstr('${i.id}')">${i.name}</button>`
  ).join("");
}

function selectInstr(id){
  currentInstr = instruments.find(i => i.id === id);
  render();
}

function renderMain(){
  document.getElementById("title").textContent = currentInstr.name;
  document.getElementById("desc").textContent = currentInstr.description;
}

function renderCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const days = ["Mon","Tue","Wed","Thu","Fri"];

  cal.appendChild(document.createElement("div"));
  days.forEach(d=>{
    const h=document.createElement("div");
    h.className="cell header";
    h.textContent=d;
    cal.appendChild(h);
  });

  for(let h=8; h<20; h++){
    const t=document.createElement("div");
    t.className="cell time";
    t.textContent=h+":00";
    cal.appendChild(t);

    for(let d=0; d<5; d++){
      const c=document.createElement("div");
      c.className="cell";
      c.onclick=()=>createBooking(h);
      cal.appendChild(c);
    }
  }
}

async function createBooking(hour){
  log("Creating booking...");

  const newBooking = {
    id: Date.now().toString(),
    instrument: currentInstr.id,
    date: new Date().toISOString().split("T")[0],
    hour: hour,
    name: currentUser,
    note: ""
  };

  const res = await fetch(`${URL}/bookings`, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "apikey": KEY,
      "Authorization": `Bearer ${KEY}`
    },
    body: JSON.stringify(newBooking)
  });

  log("Response: " + res.status);

  if(!res.ok){
    const err = await res.text();
    log("ERROR: " + err);
    return;
  }

  bookings.push(newBooking);
  renderCalendar();
}

load();
</script>

</body>
</html>
