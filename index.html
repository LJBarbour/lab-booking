<!-- everything identical except ONE FIX inside book() -->

<script>
const MAX_FUTURE_BOOKINGS = 5;

// helper
function norm(s){ return (s || "").trim().toLowerCase(); }

async function book(hour,date){

  const now = new Date();

  const userBookings = bookings.filter(b => {
    const dt = new Date(b.date + "T" + String(b.hour).padStart(2,'0') + ":00:00");

    return (
      norm(b.name) === norm(currentUser) &&
      norm(b.instrument) === norm(currentInstr.id) &&   // ✅ FIX HERE
      dt >= now
    );
  });

  console.log("User future bookings:", userBookings.length);

  if(userBookings.length >= MAX_FUTURE_BOOKINGS){
    alert("Booking limit reached for this instrument");
    return;
  }

  const row={
    id: Date.now().toString(),
    instrument: currentInstr.id,
    date: date,
    hour: hour,
    name: currentUser,
    note:""
  };

  await fetch(`${URL}/bookings`,{
    method:"POST",
    headers:HEADERS,
    body:JSON.stringify(row)
  });

  bookings = await fetch(`${URL}/bookings?select=*`, {headers:HEADERS}).then(r=>r.json());
  renderCalendar();
}
</script>
