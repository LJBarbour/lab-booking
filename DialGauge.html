<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dial Gauge Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      min-height: 100vh;
    }
    #sidebar {
      width: 320px;
      min-width: 280px;
      background: #16213e;
      padding: 20px 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-right: 1px solid #0f3460;
    }
    #sidebar h1 { font-size: 1.1rem; font-weight: 700; color: #e94560; margin-bottom: 8px; letter-spacing: 0.5px; }
    .section { background: #0f3460; border-radius: 8px; overflow: hidden; }
    .section-header {
      padding: 8px 12px; font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px; color: #a0c4ff;
      cursor: pointer; display: flex; justify-content: space-between;
      align-items: center; user-select: none;
    }
    .section-header:hover { background: rgba(255,255,255,0.05); }
    .section-header .arrow { transition: transform 0.2s; }
    .section-header.collapsed .arrow { transform: rotate(-90deg); }
    .section-body { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 8px; }
    .section-body.hidden { display: none; }
    .field { display: flex; flex-direction: column; gap: 3px; }
    .field label { font-size: 0.72rem; color: #a0c4ff; font-weight: 600; }
    .field input[type=range] { width: 100%; accent-color: #e94560; cursor: pointer; }
    .field input[type=number], .field input[type=text], .field select {
      background: #1a1a2e; border: 1px solid #0f3460; border-radius: 5px;
      color: #e0e0e0; padding: 5px 8px; font-size: 0.8rem; width: 100%; outline: none;
    }
    .field input[type=number]:focus, .field input[type=text]:focus, .field select:focus { border-color: #e94560; }
    .field input[type=color] { width: 100%; height: 32px; border: none; border-radius: 5px; cursor: pointer; background: none; padding: 0; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .val-display { font-size: 0.7rem; color: #e94560; text-align: right; margin-top: -4px; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .toggle-row label { font-size: 0.72rem; color: #a0c4ff; font-weight: 600; }
    .toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background: #1a1a2e; border-radius: 20px; transition: 0.3s;
    }
    .toggle-slider:before {
      position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
      background: #666; border-radius: 50%; transition: 0.3s;
    }
    .toggle input:checked + .toggle-slider { background: #e94560; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(16px); background: white; }
    .zone-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 6px; align-items: end; }
    .zone-row .field label { font-size: 0.65rem; }
    .zone-row button { background: #e94560; border: none; color: white; border-radius: 4px; cursor: pointer; font-size: 0.8rem; padding: 5px 8px; height: 28px; align-self: end; }
    #add-zone-btn { background: #0f3460; border: 1px dashed #a0c4ff; color: #a0c4ff; border-radius: 5px; padding: 6px; cursor: pointer; font-size: 0.75rem; width: 100%; margin-top: 4px; }
    #add-zone-btn:hover { background: rgba(160,196,255,0.1); }
    .action-btn { padding: 10px; border: none; border-radius: 7px; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s; width: 100%; margin-top: 4px; }
    .action-btn:hover { opacity: 0.85; }
    .action-btn:active { transform: scale(0.98); }
    #copy-btn { background: #e94560; color: white; }
    #download-btn { background: #0f3460; color: #a0c4ff; border: 1px solid #a0c4ff; }
    #save-settings-btn { background: #1a6e3c; color: #90ffb0; border: 1px solid #90ffb0; }
    #load-settings-btn { background: #3a3a00; color: #ffe066; border: 1px solid #ffe066; }
    .copy-toast { font-size: 0.75rem; text-align: center; color: #4caf50; min-height: 18px; transition: opacity 0.4s; }
    #canvas-area {
      flex: 1; display: flex; align-items: center; justify-content: center; padding: 30px;
      background: repeating-conic-gradient(#2a2a4a 0% 25%, #1a1a2e 0% 50%) 0 0 / 20px 20px;
    }
    #gauge-canvas { border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.6); max-width: 100%; max-height: 80vh; background: transparent; }
  </style>
</head>
<body>
<aside id="sidebar">
  <h1>🎛️ Dial Gauge Generator</h1>

  <!-- VALUE & RANGE -->
  <div class="section">
    <div class="section-header collapsed" data-target="sec-value">Value &amp; Range <span class="arrow">▾</span></div>
    <div class="section-body hidden" id="sec-value">
      <div class="field">
        <label>Current Value: <span id="disp-value">65</span></label>
        <input type="range" id="val-value-slider" min="0" max="100" step="any" value="65">
        <input type="number" id="val-value" value="65" style="margin-top:4px;">
      </div>
      <div class="row2">
        <div class="field"><label>Min</label><input type="number" id="val-min" value="0"></div>
        <div class="field"><label>Max</label><input type="number" id="val-max" value="100"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Start Angle (°)</label><input type="number" id="val-startAngle" value="-125"></div>
        <div class="field"><label>End Angle (°)</label><input type="number" id="val-endAngle" value="125"></div>
      </div>
    </div>
  </div>

  <!-- CANVAS SIZE -->
  <div class="section">
    <div class="section-header collapsed" data-target="sec-canvas">Canvas Size <span class="arrow">▾</span></div>
    <div class="section-body hidden" id="sec-canvas">
      <div class="field">
        <label>Size (px): <span id="disp-size">500</span></label>
        <input type="range" id="val-size" min="200" max="1200" step="10" value="500">
      </div>
    </div>
  </div>

  <!-- BEZEL -->
  <div class="section">
    <div class="section-header collapsed" data-target="sec-bezel">Bezel <span class="arrow">▾</span></div>
    <div class="section-body hidden" id="sec-bezel">
      <div class="field"><label>Bezel Style</label>
        <select id="val-bezelStyle">
          <option value="flat-metallic">Flat Metallic</option>
          <option value="brushed-steel" selected>Brushed Steel</option>
          <option value="deep-chrome">Deep Chrome</option>
          <option value="toroidal">Toroidal</option>
          <option value="knurled">Knurled Ring</option>
        </select>
      </div>
      <div class="field">
        <label>Bezel Width: <span id="disp-bezelWidth">28</span></label>
        <input type="range" id="val-bezelWidth" min="4" max="60" step="1" value="28">
      </div>
      <div class="field"><label>Bezel Base Colour</label><input type="color" id="val-bezelColor" value="#b0b0b0"></div>
    </div>
  </div>

  <!-- DIAL FACE -->
  <div class="section">
    <div class="section-header collapsed" data-target="sec-dial">Dial Face <span class="arrow">▾</span></div>
    <div class="section-body hidden" id="sec-dial">
      <div class="field"><label>Face Colour</label><input type="color" id="val-faceColor" value="#ffffff"></div>
      <div class="field">
        <label>Face Opacity: <span id="disp-faceOpacity">1.00</span></label>
        <input type="range" id="val-faceOpacity" min="0" max="1" step="0.01" value="1">
      </div>
      <div class="toggle-row"><label>Glass Sheen</label>
        <label class="toggle"><input type="checkbox" id="val-glassSheen" checked><span class="toggle-slider"></span></label>
      </div>
      <div class="toggle-row"><label>Drop Shadow</label>
        <label class="toggle"><input type="checkbox" id="val-shadow" checked><span class="toggle-slider"></span></label>
      </div>
    </div>
  </div>

  <!-- ARC TRACK -->
  <div class="section">
    <div class="section-header collapsed" data-target="sec-arc">Arc Track <span class="arrow">▾</span></div>
    <div class="section-body hidden" id="sec-arc">
      <div class="toggle-row"><label>Show Track Ring</label>
        <label class="toggle"><input type="checkbox" id="val-showTrack" checked><span class="toggle-slider"></span></label>
      </div>
      <div class="field"><label>Track Colour</label><input type="color" id="val-trackColor" value="#e0e0e0"></div>
      <div class="field">
        <label>Track Width: <span id="disp-trackWidth">8</span></label>
        <input type="range" id="val-trackWidth" min="0" max="40" step="1" value="8">
      </div>
      <div class="toggle-row"><label>Show Progress Arc</label>
        <label class="toggle"><input type="checkbox" id="val-showProgress" checked><span class="toggle-slider"></span></label>
      </div>
      <div class="field"><label>Progress Colour</label><input type="color" id="val-progressColor" value="#cc0000"></div>
      <div class="field">
        <label>Progress Width: <span id="disp-progressWidth">8</span></label>
        <input type="range" id="val-progressWidth" min="0" max="40" step="1" value="8">
      </div>
      <div class="field"><label>Line Cap</label>
        <select id="val-lineCap">
          <option value="butt">Butt</option>
          <option value="round" selected>Round</option>
          <option value="square">Square</option>
        </select>
      </div>
    </div>
  </div>

  <!-- NEEDLE -->
  <div class="section">
    <div class="section-header collapsed" data-target="sec-needle">Needle <span class="arrow">▾</span></div>
    <div class="section-body hidden" id="sec-needle">
      <div class="field"><label>Needle Style</label>
        <select id="val-needleStyle">
          <option value="tapered">Tapered (classic)</option>
          <option value="tapered-tail">Tapered with Tail</option>
          <option value="rod">Rod (uniform width)</option>
          <option value="rod-tail">Rod with Tail</option>
          <option value="wedge">Wedge</option>
        </select>
      </div>
      <div class="field"><label>Needle Colour</label><input type="color" id="val-needleColor" value="#cc0000"></div>
      <div class="field">
        <label>Needle Length (%): <span id="disp-needleLength">78</span></label>
        <input type="range" id="val-needleLength" min="20" max="100" step="1" value="78">
      </div>
      <div class="field">
        <label>Tail Length (%): <span id="disp-tailLength">15</span></label>
        <input type="range" id="val-tailLength" min="0" max="40" step="1" value="15">
      </div>
      <div class="field">
        <label>Needle Width: <span id="disp-needleWidth">3</span></label>
        <input type="range" id="val-needleWidth" min="1" max="20" step="0.5" value="3">
      </div>
      <div class="field"><label>Hub Colour</label><input type="color" id="val-hubColor" value="#888888"></div>
      <div class="field">
        <label>Hub Radius: <span id="disp-hubRadius">8</span></label>
        <input type="range" id="val-hubRadius" min="2" max="30" step="1" value="8">
      </div>
    </div>
  </div>

  <!-- TICKS -->
  <div class="section">
    <div class="section-header collapsed" data-target="sec-ticks">Ticks <span class="arrow">▾</span></div>
    <div class="section-body hidden" id="sec-ticks">
      <div class="field"><label>Tick Colour</label><input type="color" id="val-tickColor" value="#000000"></div>
      <p style="font-size:0.7rem;color:#a0c4ff;font-weight:700;margin-top:4px;">Major Ticks</p>
      <div class="row3">
        <div class="field"><label>Count</label><input type="number" id="val-majorCount" value="10" min="1" max="100" step="1"></div>
        <div class="field"><label>Length</label><input type="number" id="val-majorLen" value="18" min="1" max="60" step="1"></div>
        <div class="field"><label>Width</label><input type="number" id="val-majorWidth" value="2.5" min="0.5" max="10" step="0.5"></div>
      </div>
      <div class="toggle-row" style="margin-top:6px;"><label>Semi-Major Ticks</label>
        <label class="toggle"><input type="checkbox" id="val-showSemi" checked><span class="toggle-slider"></span></label>
      </div>
      <div class="row3">
        <div class="field"><label>Per Gap</label><input type="number" id="val-semiPer" value="2" min="2" max="20" step="1"></div>
        <div class="field"><label>Length</label><input type="number" id="val-semiLen" value="12" min="1" max="60" step="1"></div>
        <div class="field"><label>Width</label><input type="number" id="val-semiWidth" value="1.5" min="0.5" max="10" step="0.5"></div>
      </div>
      <div class="toggle-row" style="margin-top:6px;"><label>Minor Ticks</label>
        <label class="toggle"><input type="checkbox" id="val-showMinor" checked><span class="toggle-slider"></span></label>
      </div>
      <div class="row3">
        <div class="field"><label>Per Gap</label><input type="number" id="val-minorPer" value="5" min="2" max="50" step="1"></div>
        <div class="field"><label>Length</label><input type="number" id="val-minorLen" value="7" min="1" max="40" step="1"></div>
        <div class="field"><label>Width</label><input type="number" id="val-minorWidth" value="1" min="0.5" max="10" step="0.5"></div>
      </div>
    </div>
  </div>

  <!-- LABELS -->
  <div class="section">
    <div class="section-header collapsed" data-target="sec-labels">Labels <span class="arrow">▾</span></div>
    <div class="section-body hidden" id="sec-labels">
      <div class="toggle-row"><label>Show Labels</label>
        <label class="toggle"><input type="checkbox" id="val-showLabels" checked><span class="toggle-slider"></span></label>
      </div>
      <div class="field"><label>Label Colour</label><input type="color" id="val-labelColor" value="#000000"></div>
      <div class="field"><label>Font</label>
        <select id="val-labelFont">
          <option value="Arial">Arial</option>
          <option value="Verdana">Verdana</option>
          <option value="Georgia">Georgia</option>
          <option value="'Courier New'">Courier New</option>
          <option value="'Times New Roman'">Times New Roman</option>
          <option value="Impact">Impact</option>
          <option value="'Segoe UI'" selected>Segoe UI</option>
        </select>
      </div>
      <div class="row2">
        <div class="field"><label>Font Size (px)</label><input type="number" id="val-labelSize" value="22" min="6" max="72" step="1"></div>
        <div class="field"><label>Decimals</label><input type="number" id="val-labelDecimals" value="0" min="0" max="6" step="1"></div>
      </div>
      <div class="field">
        <label>Label Offset: <span id="disp-labelOffset">18</span></label>
        <input type="range" id="val-labelOffset" min="0" max="60" step="1" value="18">
      </div>
    </div>
  </div>

  <!-- TITLE & VALUE DISPLAY -->
  <div class="section">
    <div class="section-header collapsed" data-target="sec-title">Title &amp; Value Display <span class="arrow">▾</span></div>
    <div class="section-body hidden" id="sec-title">
      <div class="field"><label>Title Text</label><input type="text" id="val-title" value="PRESSURE"></div>
      <div class="field"><label>Title Colour</label><input type="color" id="val-titleColor" value="#000000"></div>
      <div class="row2">
        <div class="field"><label>Title Font Size</label><input type="number" id="val-titleSize" value="22" min="6" max="72" step="1"></div>
        <div class="field"><label>Title Y Offset (%)</label><input type="number" id="val-titleY" value="30" min="-100" max="100" step="1"></div>
      </div>
      <div class="toggle-row"><label>Show Value</label>
        <label class="toggle"><input type="checkbox" id="val-showValue" checked><span class="toggle-slider"></span></label>
      </div>
      <div class="field"><label>Value Colour</label><input type="color" id="val-valueColor" value="#000000"></div>
      <div class="row3">
        <div class="field"><label>Value Font Size</label><input type="number" id="val-valueSize" value="26" min="6" max="96" step="1"></div>
        <div class="field"><label>Decimals</label><input type="number" id="val-valueDecimals" value="1" min="0" max="6" step="1"></div>
        <div class="field"><label>Value Y Offset (%)</label><input type="number" id="val-valueY" value="55" min="-100" max="100" step="1"></div>
      </div>
      <div class="field"><label>Value Suffix</label><input type="text" id="val-suffix" value=" bar"></div>
    </div>
  </div>

  <!-- COLOUR ZONES -->
  <div class="section">
    <div class="section-header collapsed" data-target="sec-zones">Colour Zones <span class="arrow">▾</span></div>
    <div class="section-body hidden" id="sec-zones">
      <div id="zones-container"></div>
      <button id="add-zone-btn">+ Add Zone</button>
    </div>
  </div>

  <!-- EXPORT & SETTINGS -->
  <div class="section">
    <div class="section-header collapsed" data-target="sec-export">Export &amp; Settings <span class="arrow">▾</span></div>
    <div class="section-body hidden" id="sec-export">
      <button class="action-btn" id="copy-btn">📋 Copy as PNG</button>
      <button class="action-btn" id="download-btn">⬇️ Download PNG</button>
      <button class="action-btn" id="save-settings-btn">💾 Save Settings to File</button>
      <button class="action-btn" id="load-settings-btn">📂 Load Settings from File</button>
      <input type="file" id="load-file-input" accept=".json" style="display:none">
      <div class="copy-toast" id="copy-toast"></div>
    </div>
  </div>

</aside>

<div id="canvas-area">
  <canvas id="gauge-canvas"></canvas>
</div>

<script>
// ── Collapsible sections ──────────────────────────────────────────────────────
document.querySelectorAll('.section-header').forEach(hdr => {
  hdr.addEventListener('click', () => {
    const body = document.getElementById(hdr.dataset.target);
    const collapsed = hdr.classList.toggle('collapsed');
    body.classList.toggle('hidden', collapsed);
  });
});

// ── Helpers ───────────────────────────────────────────────────────────────────
const el = id => document.getElementById(id);
const num = id => parseFloat(el(id).value) || 0;
const int = id => parseInt(el(id).value) || 0;
const chk = id => el(id).checked;
const col = id => el(id).value;
const sel = id => el(id).value;

function syncDisp(sliderId, dispId, decimals = 0) {
  const slider = el(sliderId);
  const disp = el(dispId);
  if (!slider || !disp) return;
  disp.textContent = parseFloat(slider.value).toFixed(decimals);
  slider.addEventListener('input', () => {
    disp.textContent = parseFloat(slider.value).toFixed(decimals);
    drawGauge();
  });
}

// ── Value slider <-> number box sync ─────────────────────────────────────────
function syncValueControls() {
  const slider = el('val-value-slider');
  const box = el('val-value');
  const disp = el('disp-value');

  function updateFromSlider() {
    const dec = int('val-valueDecimals');
    box.value = parseFloat(slider.value).toFixed(dec);
    disp.textContent = parseFloat(slider.value).toFixed(dec);
    drawGauge();
  }
  function updateFromBox() {
    slider.value = box.value;
    const dec = int('val-valueDecimals');
    disp.textContent = parseFloat(box.value).toFixed(dec);
    drawGauge();
  }
  slider.addEventListener('input', updateFromSlider);
  box.addEventListener('input', updateFromBox);

  // Update slider range when min/max change
  el('val-min').addEventListener('input', () => {
    slider.min = el('val-min').value;
    drawGauge();
  });
  el('val-max').addEventListener('input', () => {
    slider.max = el('val-max').value;
    drawGauge();
  });
}

// ── Wire all controls to redraw ───────────────────────────────────────────────
function wireAll() {
  document.querySelectorAll('#sidebar input, #sidebar select').forEach(inp => {
    if (inp.id === 'val-value-slider' || inp.id === 'val-value' ||
        inp.id === 'val-min' || inp.id === 'val-max' ||
        inp.id === 'load-file-input') return;
    inp.addEventListener('input', drawGauge);
    inp.addEventListener('change', drawGauge);
  });
}

// ── Slider display sync ───────────────────────────────────────────────────────
function initDisplays() {
  syncDisp('val-size', 'disp-size');
  syncDisp('val-bezelWidth', 'disp-bezelWidth');
  syncDisp('val-faceOpacity', 'disp-faceOpacity', 2);
  syncDisp('val-trackWidth', 'disp-trackWidth');
  syncDisp('val-progressWidth', 'disp-progressWidth');
  syncDisp('val-needleLength', 'disp-needleLength');
  syncDisp('val-tailLength', 'disp-tailLength');
  syncDisp('val-needleWidth', 'disp-needleWidth');
  syncDisp('val-hubRadius', 'disp-hubRadius');
  syncDisp('val-labelOffset', 'disp-labelOffset');
}

// ── Colour zones ──────────────────────────────────────────────────────────────
let zones = [];
function addZone(z) {
  const id = Date.now() + Math.random();
  zones.push({ id, from: z?.from ?? 60, to: z?.to ?? 80, color: z?.color ?? '#ff9800' });
  renderZones();
}
function renderZones() {
  const c = el('zones-container');
  c.innerHTML = '';
  zones.forEach(z => {
    const row = document.createElement('div');
    row.className = 'zone-row';
    row.style.marginBottom = '6px';
    row.innerHTML = `
      <div class="field"><label>From</label><input type="number" value="${z.from}" data-zid="${z.id}" data-zprop="from"></div>
      <div class="field"><label>To</label><input type="number" value="${z.to}" data-zid="${z.id}" data-zprop="to"></div>
      <div class="field"><label>Colour</label><input type="color" value="${z.color}" data-zid="${z.id}" data-zprop="color"></div>
      <button data-zid="${z.id}" title="Remove">✕</button>`;
    c.appendChild(row);
    row.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', () => {
        const zone = zones.find(x => x.id == inp.dataset.zid);
        if (zone) { zone[inp.dataset.zprop] = inp.type === 'color' ? inp.value : parseFloat(inp.value); drawGauge(); }
      });
    });
    row.querySelector('button').addEventListener('click', e => {
      zones = zones.filter(x => x.id != e.target.dataset.zid);
      renderZones(); drawGauge();
    });
  });
}
el('add-zone-btn').addEventListener('click', () => { addZone(); drawGauge(); });

// ── Drawing ───────────────────────────────────────────────────────────────────
const canvas = el('gauge-canvas');
const ctx = canvas.getContext('2d');

function degToRad(d) { return d * Math.PI / 180; }

function drawBezel(cx, cy, outerR, innerR, style, baseColor) {
  const bw = outerR - innerR;

  if (style === 'flat-metallic') {
    const grad = ctx.createRadialGradient(cx - outerR*0.2, cy - outerR*0.2, innerR*0.5, cx, cy, outerR);
    grad.addColorStop(0, lighten(baseColor, 80));
    grad.addColorStop(0.3, lighten(baseColor, 30));
    grad.addColorStop(0.6, baseColor);
    grad.addColorStop(0.85, darken(baseColor, 30));
    grad.addColorStop(1, darken(baseColor, 60));
    ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI*2);
    ctx.arc(cx, cy, innerR, 0, Math.PI*2, true);
    ctx.fillStyle = grad; ctx.fill();
    // inner edge highlight
    const ig = ctx.createRadialGradient(cx, cy, innerR-2, cx, cy, innerR+4);
    ig.addColorStop(0, 'rgba(255,255,255,0.5)');
    ig.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(cx, cy, innerR+4, 0, Math.PI*2);
    ctx.arc(cx, cy, innerR-2, 0, Math.PI*2, true);
    ctx.fillStyle = ig; ctx.fill();

  } else if (style === 'brushed-steel') {
    // Base ring
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI*2);
    ctx.arc(cx, cy, innerR, 0, Math.PI*2, true);
    ctx.clip();
    // Brushed stripes
    const stripeGrad = ctx.createLinearGradient(cx - outerR, cy, cx + outerR, cy);
    const c1 = lighten(baseColor, 40), c2 = darken(baseColor, 10), c3 = lighten(baseColor, 60);
    for (let i = 0; i <= 20; i++) {
      stripeGrad.addColorStop(i/20, i%2===0 ? c1 : c2);
    }
    ctx.fillStyle = stripeGrad;
    ctx.fillRect(cx - outerR, cy - outerR, outerR*2, outerR*2);
    // Overlay radial shading
    const ov = ctx.createRadialGradient(cx, cy - outerR*0.3, innerR*0.3, cx, cy, outerR);
    ov.addColorStop(0, 'rgba(255,255,255,0.25)');
    ov.addColorStop(0.5, 'rgba(255,255,255,0.05)');
    ov.addColorStop(1, 'rgba(0,0,0,0.35)');
    ctx.fillStyle = ov;
    ctx.fillRect(cx - outerR, cy - outerR, outerR*2, outerR*2);
    ctx.restore();
    // Edge rings
    ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, innerR, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1.5; ctx.stroke();

  } else if (style === 'deep-chrome') {
    const grad = ctx.createRadialGradient(cx - outerR*0.25, cy - outerR*0.25, 0, cx, cy, outerR);
    grad.addColorStop(0,   '#ffffff');
    grad.addColorStop(0.15, lighten(baseColor, 70));
    grad.addColorStop(0.3,  lighten(baseColor, 20));
    grad.addColorStop(0.5,  darken(baseColor, 10));
    grad.addColorStop(0.7,  darken(baseColor, 40));
    grad.addColorStop(0.85, lighten(baseColor, 10));
    grad.addColorStop(1,    darken(baseColor, 60));
    ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI*2);
    ctx.arc(cx, cy, innerR, 0, Math.PI*2, true);
    ctx.fillStyle = grad; ctx.fill();
    // Specular hotspot
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI*2);
    ctx.arc(cx, cy, innerR, 0, Math.PI*2, true); ctx.clip();
    const spot = ctx.createRadialGradient(cx - outerR*0.3, cy - outerR*0.4, 0, cx - outerR*0.3, cy - outerR*0.4, outerR*0.4);
    spot.addColorStop(0, 'rgba(255,255,255,0.7)');
    spot.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = spot; ctx.fillRect(cx-outerR, cy-outerR, outerR*2, outerR*2);
    ctx.restore();

  } else if (style === 'toroidal') {
    // Simulate a torus cross-section: the ring appears rounded/tubular
    const steps = 120;
    for (let i = 0; i < steps; i++) {
      const a0 = (i / steps) * Math.PI * 2;
      const a1 = ((i + 1) / steps) * Math.PI * 2;
      const midA = (a0 + a1) / 2;
      // Light comes from top-left
      const lightAngle = -Math.PI * 0.6;
      const diff = Math.cos(midA - lightAngle);
      const t = (diff + 1) / 2; // 0..1
      const bright = Math.round(80 + t * 140);
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a0)*outerR, cy + Math.sin(a0)*outerR);
      ctx.arc(cx, cy, outerR, a0, a1);
      ctx.arc(cx, cy, innerR, a1, a0, true);
      ctx.closePath();
      ctx.fillStyle = `rgb(${bright},${bright},${bright})`;
      ctx.fill();
    }
    // Specular highlight arc (top-left)
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI*2);
    ctx.arc(cx, cy, innerR, 0, Math.PI*2, true); ctx.clip();
    const midR = (outerR + innerR) / 2;
    const spec = ctx.createRadialGradient(
      cx + Math.cos(-2.0)*midR*0.8, cy + Math.sin(-2.0)*midR*0.8, 0,
      cx + Math.cos(-2.0)*midR*0.8, cy + Math.sin(-2.0)*midR*0.8, bw*1.2);
    spec.addColorStop(0, 'rgba(255,255,255,0.85)');
    spec.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = spec; ctx.fillRect(cx-outerR, cy-outerR, outerR*2, outerR*2);
    ctx.restore();

  } else if (style === 'knurled') {
    const facets = 72;
    for (let i = 0; i < facets; i++) {
      const a0 = (i / facets) * Math.PI * 2;
      const a1 = ((i + 1) / facets) * Math.PI * 2;
      const bright = i % 2 === 0 ? lighten(baseColor, 35) : darken(baseColor, 25);
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a0)*outerR, cy + Math.sin(a0)*outerR);
      ctx.arc(cx, cy, outerR, a0, a1);
      ctx.arc(cx, cy, innerR, a1, a0, true);
      ctx.closePath();
      ctx.fillStyle = bright; ctx.fill();
    }
    // Groove lines
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI*2);
    ctx.arc(cx, cy, innerR, 0, Math.PI*2, true); ctx.clip();
    for (let i = 0; i < facets; i++) {
      const a = (i / facets) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a)*innerR, cy + Math.sin(a)*innerR);
      ctx.lineTo(cx + Math.cos(a)*outerR, cy + Math.sin(a)*outerR);
      ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 0.8; ctx.stroke();
    }
    // Radial sheen
    const sheen = ctx.createRadialGradient(cx, cy - outerR*0.4, innerR*0.2, cx, cy, outerR);
    sheen.addColorStop(0, 'rgba(255,255,255,0.2)');
    sheen.addColorStop(0.5, 'rgba(255,255,255,0.05)');
    sheen.addColorStop(1, 'rgba(0,0,0,0.3)');
    ctx.fillStyle = sheen; ctx.fillRect(cx-outerR, cy-outerR, outerR*2, outerR*2);
    ctx.restore();
    ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, innerR, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; ctx.stroke();
  }
}

function lighten(hex, amt) { return shiftColor(hex, amt); }
function darken(hex, amt)  { return shiftColor(hex, -amt); }
function shiftColor(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0,Math.min(255,r+amt)); g = Math.max(0,Math.min(255,g+amt)); b = Math.max(0,Math.min(255,b+amt));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function drawNeedle(ctx, cx, cy, radius, angleRad, style, color, lengthPct, tailPct, widthPx, hubR) {
  const tipR   = radius * lengthPct / 100;
  const tailR  = radius * tailPct  / 100;
  const cos = Math.cos(angleRad), sin = Math.sin(angleRad);
  const pcos = Math.cos(angleRad + Math.PI/2), psin = Math.sin(angleRad + Math.PI/2);

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;

  if (style === 'tapered') {
    // Classic tapered: wide at hub, sharp at tip, no tail
    const baseW = widthPx * 2.5;
    ctx.beginPath();
    ctx.moveTo(cx + cos*tipR, cy + sin*tipR);
    ctx.lineTo(cx + pcos*baseW/2, cy + psin*baseW/2);
    ctx.lineTo(cx - pcos*baseW/2, cy - psin*baseW/2);
    ctx.closePath();
    ctx.fillStyle = color; ctx.fill();

  } else if (style === 'tapered-tail') {
    // Tapered with a short tail behind hub
    const baseW = widthPx * 2.5;
    const tailTipW = widthPx * 0.8;
    ctx.beginPath();
    ctx.moveTo(cx + cos*tipR, cy + sin*tipR); // tip
    ctx.lineTo(cx + pcos*baseW/2, cy + psin*baseW/2); // base left
    ctx.lineTo(cx - cos*tailR + pcos*tailTipW/2, cy - sin*tailR + psin*tailTipW/2); // tail left
    ctx.lineTo(cx - cos*tailR - pcos*tailTipW/2, cy - sin*tailR - psin*tailTipW/2); // tail right
    ctx.lineTo(cx - pcos*baseW/2, cy - psin*baseW/2); // base right
    ctx.closePath();
    ctx.fillStyle = color; ctx.fill();

  } else if (style === 'rod') {
    // Uniform width rod, no tail
    const hw = widthPx / 2;
    ctx.beginPath();
    ctx.moveTo(cx + pcos*hw, cy + psin*hw);
    ctx.lineTo(cx + cos*tipR + pcos*hw, cy + sin*tipR + psin*hw);
    ctx.lineTo(cx + cos*tipR - pcos*hw, cy + sin*tipR - psin*hw);
    ctx.lineTo(cx - pcos*hw, cy - psin*hw);
    ctx.closePath();
    ctx.fillStyle = color; ctx.fill();

  } else if (style === 'rod-tail') {
    // Rod with tail behind hub
    const hw = widthPx / 2;
    ctx.beginPath();
    ctx.moveTo(cx + pcos*hw, cy + psin*hw);
    ctx.lineTo(cx + cos*tipR + pcos*hw, cy + sin*tipR + psin*hw);
    ctx.lineTo(cx + cos*tipR - pcos*hw, cy + sin*tipR - psin*hw);
    ctx.lineTo(cx - pcos*hw, cy - psin*hw);
    ctx.lineTo(cx - cos*tailR - pcos*hw, cy - sin*tailR - psin*hw);
    ctx.lineTo(cx - cos*tailR + pcos*hw, cy - sin*tailR + psin*hw);
    ctx.closePath();
    ctx.fillStyle = color; ctx.fill();

  } else if (style === 'wedge') {
    // Wedge: wide at tip, narrow at hub — like a knife blade
    const tipW = widthPx * 1.2;
    const baseW = widthPx * 0.3;
    ctx.beginPath();
    ctx.moveTo(cx + cos*tipR + pcos*tipW/2, cy + sin*tipR + psin*tipW/2);
    ctx.lineTo(cx + cos*tipR - pcos*tipW/2, cy + sin*tipR - psin*tipW/2);
    ctx.lineTo(cx + pcos*baseW/2, cy + psin*baseW/2);
    ctx.lineTo(cx - pcos*baseW/2, cy - psin*baseW/2);
    ctx.closePath();
    ctx.fillStyle = color; ctx.fill();
  }

  ctx.restore();

  // Hub
  const hubGrad = ctx.createRadialGradient(cx - hubR*0.3, cy - hubR*0.3, 0, cx, cy, hubR);
  hubGrad.addColorStop(0, '#ffffff');
  hubGrad.addColorStop(0.4, col('val-hubColor'));
  hubGrad.addColorStop(1, darken(col('val-hubColor'), 50));
  ctx.beginPath(); ctx.arc(cx, cy, hubR, 0, Math.PI*2);
  ctx.fillStyle = hubGrad; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1; ctx.stroke();
}

function drawGauge() {
  const size       = num('val-size');
  const minVal     = num('val-min');
  const maxVal     = num('val-max');
  const curVal     = num('val-value');
  const startAngle = num('val-startAngle');
  const endAngle   = num('val-endAngle');
  const valDec     = int('val-valueDecimals');

  // Update value display with correct decimals
  el('disp-value').textContent = curVal.toFixed(valDec);

  canvas.width  = size;
  canvas.height = size;
  ctx.clearRect(0, 0, size, size);

  const cx = size / 2, cy = size / 2;
  const bezelW  = num('val-bezelWidth');
  const outerR  = size / 2 - 4;
  const innerR  = outerR - bezelW;
  const faceR   = innerR - 2;

  // ── Bezel ──
  drawBezel(cx, cy, outerR, innerR, sel('val-bezelStyle'), col('val-bezelColor'));

  // ── Face ──
  ctx.save();
  if (chk('val-shadow')) {
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 18; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 4;
  }
  const faceGrad = ctx.createRadialGradient(cx, cy - faceR*0.2, faceR*0.1, cx, cy, faceR);
  const faceHex = col('val-faceColor');
  const faceOpacity = num('val-faceOpacity');
  faceGrad.addColorStop(0, hexToRgba(lighten(faceHex, 20), faceOpacity));
  faceGrad.addColorStop(1, hexToRgba(darken(faceHex, 15), faceOpacity));
  ctx.beginPath(); ctx.arc(cx, cy, faceR, 0, Math.PI*2);
  ctx.fillStyle = faceGrad; ctx.fill();
  ctx.restore();

  // ── Angle helpers ──
  // Convert degrees (0=right, clockwise) to canvas radians
  // Our convention: 0° = top (12 o'clock), clockwise positive
  // Canvas: 0 rad = right, so we subtract 90°
  const totalAngle = endAngle - startAngle;
  function valueToAngleRad(v) {
    const frac = (v - minVal) / (maxVal - minVal);
    const deg  = startAngle + frac * totalAngle;
    return degToRad(deg - 90);
  }

  const arcStartRad = degToRad(startAngle - 90);
  const arcEndRad   = degToRad(endAngle   - 90);

  // ── Colour zones ──
  zones.forEach(z => {
    const zStart = valueToAngleRad(z.from);
    const zEnd   = valueToAngleRad(z.to);
    const trackW = num('val-trackWidth') || 10;
    ctx.beginPath();
    ctx.arc(cx, cy, faceR - trackW/2 - 2, zStart, zEnd);
    ctx.strokeStyle = z.color;
    ctx.lineWidth = trackW;
    ctx.lineCap = sel('val-lineCap');
    ctx.stroke();
  });

  // ── Arc track ──
  if (chk('val-showTrack') && num('val-trackWidth') > 0) {
    const tw = num('val-trackWidth');
    ctx.beginPath();
    ctx.arc(cx, cy, faceR - tw/2 - 2, arcStartRad, arcEndRad);
    ctx.strokeStyle = col('val-trackColor');
    ctx.lineWidth = tw;
    ctx.lineCap = sel('val-lineCap');
    ctx.stroke();
  }

  // ── Progress arc ──
  if (chk('val-showProgress') && num('val-progressWidth') > 0) {
    const pw = num('val-progressWidth');
    const progEndRad = valueToAngleRad(curVal);
    ctx.beginPath();
    ctx.arc(cx, cy, faceR - pw/2 - 2, arcStartRad, progEndRad);
    ctx.strokeStyle = col('val-progressColor');
    ctx.lineWidth = pw;
    ctx.lineCap = sel('val-lineCap');
    ctx.stroke();
  }

  // ── Ticks ──
  const majorCount = int('val-majorCount');
  const majorLen   = num('val-majorLen');
  const majorW     = num('val-majorWidth');
  const showSemi   = chk('val-showSemi');
  const semiPer    = int('val-semiPer');
  const semiLen    = num('val-semiLen');
  const semiW      = num('val-semiWidth');
  const showMinor  = chk('val-showMinor');
  const minorPer   = int('val-minorPer');
  const minorLen   = num('val-minorLen');
  const minorW     = num('val-minorWidth');
  const tickColor  = col('val-tickColor');
  const tickR      = faceR - 4;

  const totalMinorDivs = majorCount * minorPer;
  for (let i = 0; i <= totalMinorDivs; i++) {
    const frac = i / totalMinorDivs;
    const a = degToRad(startAngle + frac * totalAngle - 90);
    const isMajor = (i % minorPer === 0);
    const isSemi  = showSemi && !isMajor && (i % Math.round(minorPer / semiPer) === 0);
    const isMinor = !isMajor && !isSemi;

    let len = 0, lw = 0;
    if (isMajor)       { len = majorLen; lw = majorW; }
    else if (isSemi)   { if (showSemi) { len = semiLen; lw = semiW; } }
    else if (isMinor)  { if (showMinor) { len = minorLen; lw = minorW; } }

    if (len === 0) continue;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a)*(tickR), cy + Math.sin(a)*(tickR));
    ctx.lineTo(cx + Math.cos(a)*(tickR - len), cy + Math.sin(a)*(tickR - len));
    ctx.strokeStyle = tickColor; ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.stroke();
  }

  // ── Labels ──
  if (chk('val-showLabels')) {
    const labelOffset = num('val-labelOffset');
    const labelR = tickR - majorLen - labelOffset;
    const labelSize = int('val-labelSize');
    const labelDec  = int('val-labelDecimals');
    ctx.fillStyle = col('val-labelColor');
    ctx.font = `bold ${labelSize}px ${sel('val-labelFont')}`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (let i = 0; i <= majorCount; i++) {
      const frac = i / majorCount;
      const v = minVal + frac * (maxVal - minVal);
      const a = degToRad(startAngle + frac * totalAngle - 90);
      const lx = cx + Math.cos(a) * labelR;
      const ly = cy + Math.sin(a) * labelR;
      ctx.fillText(v.toFixed(labelDec), lx, ly);
    }
  }

  // ── Title ──
  if (el('val-title').value.trim()) {
    const titleY = cy + (num('val-titleY') / 100) * faceR;
    ctx.fillStyle = col('val-titleColor');
    ctx.font = `bold ${int('val-titleSize')}px ${sel('val-labelFont')}`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(el('val-title').value, cx, titleY);
  }

  // ── Value display ──
  if (chk('val-showValue')) {
    const valueY = cy + (num('val-valueY') / 100) * faceR;
    const suffix = el('val-suffix').value;
    ctx.fillStyle = col('val-valueColor');
    ctx.font = `bold ${int('val-valueSize')}px ${sel('val-labelFont')}`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(curVal.toFixed(valDec) + suffix, cx, valueY);
  }

  // ── Needle ──
  const needleAngleRad = valueToAngleRad(curVal);
  drawNeedle(ctx, cx, cy, faceR,
    needleAngleRad,
    sel('val-needleStyle'),
    col('val-needleColor'),
    num('val-needleLength'),
    num('val-tailLength'),
    num('val-needleWidth'),
    num('val-hubRadius')
  );

  // ── Glass sheen ──
  if (chk('val-glassSheen')) {
    const sheen = ctx.createRadialGradient(cx - faceR*0.2, cy - faceR*0.35, faceR*0.05, cx, cy - faceR*0.1, faceR*0.9);
    sheen.addColorStop(0, 'rgba(255,255,255,0.22)');
    sheen.addColorStop(0.5, 'rgba(255,255,255,0.06)');
    sheen.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(cx, cy, faceR, 0, Math.PI*2);
    ctx.fillStyle = sheen; ctx.fill();
  }
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Save / Load settings ──────────────────────────────────────────────────────
const SETTINGS_VERSION = 2;
const SETTINGS_KEYS = [
  'val-value','val-min','val-max','val-startAngle','val-endAngle',
  'val-size',
  'val-bezelStyle','val-bezelWidth','val-bezelColor',
  'val-faceColor','val-faceOpacity','val-glassSheen','val-shadow',
  'val-showTrack','val-trackColor','val-trackWidth',
  'val-showProgress','val-progressColor','val-progressWidth','val-lineCap',
  'val-needleStyle','val-needleColor','val-needleLength','val-tailLength',
  'val-needleWidth','val-hubColor','val-hubRadius',
  'val-tickColor',
  'val-majorCount','val-majorLen','val-majorWidth',
  'val-showSemi','val-semiPer','val-semiLen','val-semiWidth',
  'val-showMinor','val-minorPer','val-minorLen','val-minorWidth',
  'val-showLabels','val-labelColor','val-labelFont','val-labelSize','val-labelDecimals','val-labelOffset',
  'val-title','val-titleColor','val-titleSize','val-titleY',
  'val-showValue','val-valueColor','val-valueSize','val-valueDecimals','val-valueY','val-suffix'
];

el('save-settings-btn').addEventListener('click', () => {
  const settings = { _version: SETTINGS_VERSION, zones: JSON.parse(JSON.stringify(zones)) };
  SETTINGS_KEYS.forEach(id => {
    const e = el(id);
    if (!e) return;
    settings[id] = e.type === 'checkbox' ? e.checked : e.value;
  });
  const blob = new Blob([JSON.stringify(settings, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'dial-gauge-settings.json';
  a.click();
});

el('load-settings-btn').addEventListener('click', () => el('load-file-input').click());
el('load-file-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const settings = JSON.parse(evt.target.result);
      SETTINGS_KEYS.forEach(id => {
        if (!(id in settings)) return; // backwards compatible: skip missing keys
        const elem = el(id);
        if (!elem) return;
        if (elem.type === 'checkbox') elem.checked = settings[id];
        else elem.value = settings[id];
      });
      // Sync value slider
      el('val-value-slider').value = settings['val-value'] ?? el('val-value').value;
      el('val-value-slider').min   = settings['val-min']   ?? el('val-min').value;
      el('val-value-slider').max   = settings['val-max']   ?? el('val-max').value;
      // Restore zones
      zones = [];
      if (Array.isArray(settings.zones)) {
        settings.zones.forEach(z => addZone(z));
      }
      renderZones();
      // Update all slider displays
      initDisplays();
      drawGauge();
      showToast('Settings loaded ✓');
    } catch(err) { showToast('Error reading file'); }
    e.target.value = '';
  };
  reader.readAsText(file);
});

// ── Export ────────────────────────────────────────────────────────────────────
el('copy-btn').addEventListener('click', () => {
  canvas.toBlob(blob => {
    navigator.clipboard.write([new ClipboardItem({'image/png': blob})])
      .then(() => showToast('Copied to clipboard ✓'))
      .catch(() => showToast('Copy failed — try Download'));
  });
});
el('download-btn').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = 'dial-gauge.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});

function showToast(msg) {
  const t = el('copy-toast'); t.textContent = msg; t.style.opacity = 1;
  setTimeout(() => { t.style.opacity = 0; }, 2500);
}

// ── Init ──────────────────────────────────────────────────────────────────────
initDisplays();
syncValueControls();
wireAll();
addZone({ from: 0,  to: 60,  color: '#4caf50' });
addZone({ from: 60, to: 80,  color: '#ff9800' });
addZone({ from: 80, to: 100, color: '#f44336' });
drawGauge();
</script>
</body>
